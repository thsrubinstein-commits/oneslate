document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\">\n\n<script src=\"738497ab-050e-4102-915c-c187d5afba01\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n<style>/* ============================================================================\n   INKFIELD — colors_and_type.css\n   The single source of truth for color, type, spacing, radius and motion tokens.\n\n   Thesis (v2): restraint with a voice. The chrome stays grayscale + one signal\n   light, but glyphs are now a DEFINED ORNAMENTAL LAYER — box-drawing rules,\n   orientation blobs and the brightness ramp used as dividers, bullets, tab marks\n   and section seams. Glyphs are texture, never a second color: they live in\n   --fg-3/--fg-4, the amber stays reserved for the one live control. All color\n   richness still comes from the canvas, never the interface.\n\n   Load this file, then use the semantic vars (--fg-1, --label, --accent, etc).\n   Fonts are bundled locally in /fonts (IBM Plex Mono, OFL licensed).\n   ============================================================================ */\n\n/* ---- Fonts -------------------------------------------------------------- */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-weight: 300;\n  font-style: normal;\n  font-display: swap;\n  src: url(\"d76bda59-d75c-44eb-a134-4c2302fd1748\") format('woff2');\n}\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n  src: url(\"9fe0c998-eede-464d-a566-0d31633143b7\") format('woff2');\n}\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-weight: 500;\n  font-style: normal;\n  font-display: swap;\n  src: url(\"6822872e-c628-44b5-a59d-943f33f824d5\") format('woff2');\n}\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-weight: 600;\n  font-style: normal;\n  font-display: swap;\n  src: url(\"816b6748-877f-4aa7-84fe-243ae959cbe9\") format('woff2');\n}\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n  src: url(\"61f96d7a-f206-4c51-b7c7-9bdc4675b30d\") format('woff2');\n}\n\n:root {\n  /* ====================================================================\n     COLOR — grayscale plus exactly one signal light.\n     Background is near-black but never pure black: a desaturated\n     cool-neutral dark gray. Text is soft light-gray, never white.\n     ==================================================================== */\n\n  /* Backgrounds — cool-neutral dark grays, stepped (no shadows; depth = step) */\n  --bg-0:    #15171b;   /* deepest — app/stage base                          */\n  --bg-1:    #181a1f;   /* panel surface                                     */\n  --bg-2:    #1b1e23;   /* raised panel / floating rail                      */\n  --well:    #212429;   /* input wells, track grooves, inset regions         */\n  --well-hi: #262a30;   /* hover state of a well                             */\n\n  /* Hairlines — instrument-panel seams. 1px, low contrast. Never a shadow.  */\n  --line:      rgba(255, 255, 255, 0.07);  /* standard divider               */\n  --line-soft: rgba(255, 255, 255, 0.045); /* faintest registration / grid   */\n  --line-hard: rgba(255, 255, 255, 0.12);  /* control outlines, focus rest   */\n\n  /* Foreground — hierarchy by opacity/weight, NEVER by color.               */\n  --fg-1: #c7ccd3;   /* primary text, live values                           */\n  --fg-2: #8a9099;   /* secondary text, inactive labels                     */\n  --fg-3: #5e646d;   /* tertiary — captions, tick numerals, hints           */\n  --fg-4: #3c4149;   /* faintest — disabled, decorative ticks               */\n\n  /* Signal — the one accent. Warm amber: ink / phosphor / analog instrument.\n     Used ONLY for the active/interactive state: the value being changed,\n     the focused control, the lit indicator. Never decorative.              */\n  --accent:      #e8a24c;\n  --accent-dim:  #b87f3a;   /* pressed / held amber                          */\n  --accent-ink:  #15171b;   /* text/icon sitting on an amber fill            */\n  --accent-glow: rgba(232, 162, 76, 0.16); /* faint wash behind a lit field */\n\n  /* ====================================================================\n     ORNAMENT — glyphs as a defined decorative layer (v2). Always drawn in\n     the faint foreground steps so they read as texture/seams, never as a\n     second signal. Reach for these instead of inventing borders or icons.\n     ==================================================================== */\n  /* default decorative glyph · box rules ─│┌┐ · bullets ·°◦• from . o @ */\n  --glyph-ornament: var(--fg-4); /* @kind color */\n  --glyph-rule:     var(--fg-4); /* @kind color */\n  --glyph-bullet:   var(--fg-3); /* @kind color */\n  /* spread for glyph runs/alphabets · repeated box-drawing rule chars */\n  --ls-glyph:       0.28em; /* @kind spacing */\n  --ls-rule:        0.04em; /* @kind spacing */\n\n  /* The real renderer alphabets, exposed as content strings for ::before/\n     ::after ornament (read with content: var(--ramp) etc).\n     --overlay-normal ⊥ surface-normal · --overlay-tangent ‖ tangent-flow.       */\n  --ramp:      \". : - = + * # % @\"; /* @kind other */\n  --blobs:     \". o @\"; /* @kind other */\n  --dir-4:     \"- / | \\\\\"; /* @kind other */\n  --dir-8:     \"- ~ / | \\\\ ~ - _\"; /* @kind other */\n  --overlay-normal:  \"\\22a5\"; /* @kind other */\n  --overlay-tangent: \"\\2016\"; /* @kind other */\n\n  /* Status (used sparingly, in readouts only — still mostly grayscale)      */\n  --ok:   #7fae8a;   /* desaturated sage — \"ready\" / loaded                  */\n  --warn: #e8a24c;   /* reuse the signal amber                               */\n\n  /* ====================================================================\n     TYPE — monospace for the entire UI. The tool renders glyphs;\n     the interface is made of glyphs. Tabular figures everywhere so live\n     numbers don't jitter horizontally as they update.\n     ==================================================================== */\n  --font-mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', 'Menlo', 'Consolas', monospace;\n  --font-ui:   var(--font-mono);  /* there is no separate UI sans — mono only */\n\n  /* Type scale (px). Small, tight, with generous space around.              */\n  --t-micro: 10px;   /* tick numerals, finest captions                       */\n  --t-label: 11px;   /* UPPERCASE labels (dials)                             */\n  --t-meta:  12px;   /* secondary readouts, status                          */\n  --t-body:  13px;   /* body / value text                                   */\n  --t-base:  14px;   /* default UI size, button text                        */\n  --t-lg:    16px;   /* emphasized value                                     */\n  --t-h2:    18px;   /* sub-heads                                            */\n  --t-h1:    22px;   /* panel title                                          */\n  --t-display: 34px; /* rare — splash wordmark                               */\n\n  /* Weights */\n  --w-light:    300; /* @kind font */\n  --w-regular:  400; /* @kind font */\n  --w-medium:   500; /* @kind font */\n  --w-semibold: 600; /* @kind font */\n  --w-bold:     700; /* @kind font */\n\n  /* Letter-spacing — labels get the labelled-dial spread.                   */\n  --ls-label:  0.14em; /* @kind spacing */\n  --ls-tight:  0.01em; /* @kind spacing */\n  --ls-num:    0.005em; /* @kind spacing */\n\n  /* Line heights */\n  --lh-tight: 1.15; /* @kind other */\n  --lh-snug:  1.3; /* @kind other */\n  --lh-body:  1.45; /* @kind other */\n\n  /* ====================================================================\n     SPACING — 4px base grid. The UI honors a grid because the character\n     grid is literally the tool's substrate.\n     ==================================================================== */\n  --sp-1:  2px;\n  --sp-2:  4px;\n  --sp-3:  6px;\n  --sp-4:  8px;\n  --sp-5:  10px;\n  --sp-6:  12px;\n  --sp-8:  16px;\n  --sp-10: 20px;\n  --sp-12: 24px;\n  --sp-16: 32px;\n  --sp-20: 40px;\n\n  /* ====================================================================\n     RADIUS — tight, instrument-panel. Minimal rounding.\n     ==================================================================== */\n  --r-xs:    2px;   /* ticks, chips                                          */\n  --r-sm:    4px;   /* inputs, segments, mini controls                      */\n  --r-md:    6px;   /* buttons, panels                                      */\n  --r-lg:    8px;   /* floating rail container                              */\n  --r-pill:  999px;\n\n  /* ====================================================================\n     ELEVATION — flat. There are no drop shadows in the chrome. \"Raised\"\n     is expressed as a background STEP + a hairline, like a panel seam.\n     The only shadow permitted is a faint floating-rail lift for legibility\n     over a loud canvas — kept near-invisible.\n     ==================================================================== */\n  --elev-flat:  none;\n  --elev-rail:  0 1px 0 0 var(--line-hard), 0 12px 30px rgba(0, 0, 0, 0.35);\n\n  /* ====================================================================\n     MOTION — fast and mechanical. Operating equipment, not a toy.\n     Eased, never bouncy. Values update live as you drag.\n     ==================================================================== */\n  --dur-fast:  120ms; /* @kind other */\n  --dur-base:  140ms; /* @kind other */\n  --dur-slow:  160ms; /* @kind other */\n  --ease:      cubic-bezier(0.2, 0, 0, 1); /* @kind other */\n  --ease-out:  cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n\n  /* Control geometry */\n  --hit:        40px;   /* primary control height                           */\n  --hit-mini:   28px;   /* mini control height                              */\n  --hit-toggle: 34px;   /* toggle/switch row height                         */\n  --label-col:  76px;   /* fixed label column width in control rows (v2)    */\n}\n\n/* ============================================================================\n   SEMANTIC ELEMENT DEFAULTS — opt in by using these classes/elements.\n   These are documentation-grade defaults; the UI kit re-states them locally.\n   ============================================================================ */\n\n.if-root {\n  background: var(--bg-0);\n  color: var(--fg-1);\n  font-family: var(--font-mono);\n  font-weight: var(--w-regular);\n  font-size: var(--t-base);\n  line-height: var(--lh-body);\n  font-feature-settings: 'tnum' 1, 'zero' 1;  /* tabular figures + slashed 0 */\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n\n/* Headings ---------------------------------------------------------------- */\n.if-h1 {\n  font-size: var(--t-h1);\n  font-weight: var(--w-semibold);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-tight);\n  color: var(--fg-1);\n  margin: 0;\n}\n.if-h2 {\n  font-size: var(--t-h2);\n  font-weight: var(--w-medium);\n  line-height: var(--lh-snug);\n  letter-spacing: var(--ls-tight);\n  color: var(--fg-1);\n  margin: 0;\n}\n\n/* Eyebrow / labelled-dial label ------------------------------------------- */\n.if-eyebrow,\n.if-label {\n  font-size: var(--t-label);\n  font-weight: var(--w-semibold);\n  letter-spacing: var(--ls-label);\n  text-transform: uppercase;\n  color: var(--fg-2);\n  margin: 0;\n}\n.if-eyebrow { color: var(--fg-3); }\n\n/* Body / meta ------------------------------------------------------------- */\n.if-body { font-size: var(--t-body); color: var(--fg-1); line-height: var(--lh-body); margin: 0; }\n.if-meta { font-size: var(--t-meta); color: var(--fg-2); line-height: var(--lh-snug); margin: 0; }\n\n/* Live value — tabular, prominent, fg-1. Amber only when actively changing. */\n.if-value {\n  font-variant-numeric: tabular-nums;\n  font-feature-settings: 'tnum' 1, 'zero' 1;\n  letter-spacing: var(--ls-num);\n  color: var(--fg-1);\n  font-weight: var(--w-medium);\n}\n.if-value[data-live='true'] { color: var(--accent); }\n\n/* Inline code / glyph run ------------------------------------------------- */\n.if-code {\n  font-family: var(--font-mono);\n  font-size: var(--t-meta);\n  color: var(--fg-2);\n  background: var(--well);\n  border: 1px solid var(--line);\n  border-radius: var(--r-xs);\n  padding: 1px 5px;\n}\n\n/* ============================================================================\n   TOGGLE / SWITCH (v2) — the overlay switches (Normal / Tangent). A toggle row\n   pairs a glyph indicator with an UPPERCASE label. The glyph is the affordance;\n   amber lights only when the overlay is on. Unavailable = --fg-4, no pointer.\n   ============================================================================ */\n.if-switch-row {\n  display: grid;\n  grid-template-columns: var(--label-col) 1fr;\n  align-items: center;\n  gap: var(--sp-6);\n}\n\n.if-toggle {\n  min-height: var(--hit-toggle);\n  display: inline-grid;\n  grid-template-columns: auto 1fr auto;\n  align-items: center;\n  gap: var(--sp-5);\n  cursor: pointer;\n  color: var(--fg-2);\n  user-select: none;\n}\n/* the glyph indicator — ⊥ for normal, ‖ for tangent, etc. */\n.if-toggle__glyph {\n  width: 20px;\n  text-align: center;\n  font-size: 15px;\n  line-height: 1;\n  color: var(--fg-3);\n  transition: color var(--dur-fast) var(--ease);\n}\n.if-toggle__label {\n  font-size: var(--t-label);\n  font-weight: var(--w-semibold);\n  letter-spacing: var(--ls-label);\n  text-transform: uppercase;\n}\n/* the well/knob track */\n.if-toggle__track {\n  position: relative;\n  width: 34px;\n  height: 18px;\n  border-radius: var(--r-pill);\n  background: var(--well);\n  border: 1px solid var(--line-hard);\n  transition: background var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease);\n}\n.if-toggle__track::after {\n  content: '';\n  position: absolute;\n  top: 2px;\n  left: 2px;\n  width: 12px;\n  height: 12px;\n  border-radius: var(--r-xs);\n  background: var(--fg-3);\n  transition: transform var(--dur-base) var(--ease), background var(--dur-fast) var(--ease);\n}\n.if-toggle[aria-checked='true'] .if-toggle__glyph { color: var(--accent); }\n.if-toggle[aria-checked='true'] .if-toggle__track { background: var(--accent-glow); border-color: var(--accent-dim); }\n.if-toggle[aria-checked='true'] .if-toggle__track::after { transform: translateX(16px); background: var(--accent); }\n.if-toggle[aria-disabled='true'] {\n  cursor: not-allowed;\n  color: var(--fg-4);\n}\n.if-toggle[aria-disabled='true'] .if-toggle__glyph { color: var(--fg-4); }\n.if-toggle[aria-disabled='true'] .if-toggle__track { background: transparent; border-color: var(--line); }\n.if-toggle[aria-disabled='true'] .if-toggle__track::after { background: var(--fg-4); }\n.if-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: var(--r-sm); }\n\n/* ============================================================================\n   ORNAMENT HELPERS (v2) — glyph dividers, section seams, glyph bullets and\n   alphabet runs. These are the \"more glyphs as graphics\" layer; keep them in\n   --fg-3/--fg-4 so they stay texture, not signal.\n   ============================================================================ */\n\n/* A box-drawing rule divider. Put text in ::before via --rule-glyph (default ─).\n   Pair with --rule-cap for a corner/junction at the start (e.g. \"┌\" / \"├\"). */\n.if-rule {\n  --rule-glyph: '\\2500'; /* @kind other */\n  --rule-cap:   '\\251c'; /* @kind other */\n  display: flex;\n  align-items: center;\n  gap: var(--sp-4);\n  color: var(--glyph-rule);\n  font-size: var(--t-meta);\n  line-height: 1;\n  letter-spacing: var(--ls-rule);\n  user-select: none;\n}\n.if-rule::before { content: var(--rule-cap); color: var(--fg-3); }\n.if-rule__fill {\n  flex: 1;\n  height: 0;\n  border-top: 1px solid var(--line);\n}\n/* A label sitting inside a rule (section seam): \"├─ TRANSFORM ─────\" feel. */\n.if-rule__label {\n  font-size: var(--t-label);\n  font-weight: var(--w-semibold);\n  letter-spacing: var(--ls-label);\n  text-transform: uppercase;\n  color: var(--fg-2);\n}\n\n/* Glyph bullet — a real orientation blob/ramp glyph as a list marker. */\n.if-bullet { color: var(--glyph-bullet); }\n.if-bullet::before { content: '\\00b7  '; }   /* · default */\n\n/* Glyph alphabet run — for specimens & ornament strips. */\n.if-glyphs {\n  font-family: var(--font-mono);\n  letter-spacing: var(--ls-glyph);\n  color: var(--glyph-ornament);\n}\n.if-glyphs--lit { color: var(--accent); }\n\n/* Decorative tick strip (instrument lineage), e.g. a header rail. */\n.if-tickstrip {\n  height: 9px;\n  background: repeating-linear-gradient(90deg, var(--fg-4) 0 1px, transparent 1px 16px);\n  opacity: 0.9;\n}\n\n/* Glyph spinner / loading mark — cycle these in JS for a mechanical spinner:\n   - \\ | /  (use the dir-4 set). Reduced motion: leave static. */\n.if-spin {\n  display: inline-block;\n  color: var(--accent);\n  font-family: var(--font-mono);\n  font-variant-numeric: tabular-nums;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; height: 100%; background: var(--bg-0); }\n  body { font-family: var(--font-mono); font-feature-settings: 'tnum' 1, 'zero' 1; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; overflow: hidden; }\n  textarea, input, button { font-family: var(--font-mono); }\n  textarea::placeholder, input::placeholder { color: var(--fg-4); }\n  input[type=date] { color-scheme: dark; }\n  .ib-x { opacity: 0; transition: opacity 120ms; }\n  [data-card-root]:hover .ib-x { opacity: 1; }\n  @keyframes ib-spin { to { transform: rotate(360deg); } }\n  /* accessibility: visible keyboard focus (mouse clicks stay clean via :focus-visible) */\n  a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, [tabindex]:focus-visible {\n    outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px;\n  }\n  @keyframes ib-cap-in { from { opacity: 0; transform: translateY(6px) scale(0.99); } to { opacity: 1; transform: none; } }\n  /* ===== Phone UI: a self-contained overlay, only visible on narrow screens.\n     The desktop canvas is never altered — it simply sits behind this opaque layer. ===== */\n  .ib-phone { display: none; }\n  @media (max-width: 720px) {\n    .ib-phone { display: flex; }\n  }\n  .ib-phone *::-webkit-scrollbar { width: 0; height: 0; }\n  .ib-phscroll { -webkit-overflow-scrolling: touch; scrollbar-width: none; }\n<\u002Fstyle>\n<script src=\"4f434d27-33c8-4e07-929d-259faa6f182c\"><\u002Fscript>\n<!-- __ib_pwa_injector -->\n<script>\n(function(){\n  try {\n    var head = document.head;\n    var ICON180 = \"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAALQAAAC0CAYAAAA9zQYyAAAQAElEQVR4Aeydy48jVxXGb9ljd/sxMz2PJOQxYpSBhCRSJCSCBGLBBoTEhj0LpKyAPwPBAiG2wIq/gQ0SggUIRWIRRYoyeZCESWYYSDKZd7fbdtsz3alfuW9P2W27HvfY9TpRn7m3bt373XO+81V1x92nqvbYE08fqCkHZdFAzeh/ykCJGFBBlyiZGooxKmhVQakYUEGXKp0ajAq6MhqoRqAq6GrkuTJRqqArk+pqBKqCrkaeKxOlCroyqa5GoCroauS5MlGqoI0xlcl2BQJVQVcgyVUKUQVdpWxXIFYVdAWSXKUQVdBVynYFYlVBVyDJVQoxQtBVokJjLQMDKugyZFFjOGJABX1EhXbKwIC4oE+caJjuyVNmY2NThB9wwANXArDV7ph2p2s8z5OAM+0AryOC5Xme6XRPmlarLYIHZ3AHhxKA4IAHrgSedC7wSVzQm62W2dz0TSgpmz7OBK+Fv07meb5gfDEjQnCdwPzFjUbTcHG0211D3x9y+sKnlh8vovY89wtus0K5sMSLC3o8GpnxeGzGoz27h1MLzgRv5ITD4oODAzMY9I0U3ng8MsPhwIz8WOmzh4uND7nDR3x1wWKtxYNDjpdajJPgjIPc5i8X1n1xQe/tDc39e3dMv79r93BqwQEPXCegw8W7vZ3AvwcPxocjbk1vZ9ts37/nBnK4Gp+IFR8Ph5waOAMPDp2ADheDAx64h0NODXGCR9xOQKHF4oIOYWtXGVg7AyrotVOuG66SARX0KtlV7LUzoIJeO+W64SoZUEFHs6szCsSACrpAyVJXoxlQQUdzpDMKxIAKukDJUlejGVBBR3OkMwrEgAq6QMlSV6MZcBN0NL7OUAbWyoAKeq1062arZkAFvWqGFX+tDKig10q3brZqBlTQq2ZY8dfKgAp6rXQXd7OieC4uaOrOTm+dNZQ5SZAADnjgSuBR3gSeVF3cqdNbQQ2lhG/ <div style=\"position:fixed; inset:0; background:var(--bg-0); color:var(--fg-1); overflow:hidden;\">\n\n  <div ref=\"{{ stageRef }}\" style=\"position:absolute; inset:0; cursor:grab; touch-action:none; overflow:hidden;\">\n    <div style=\"position:absolute; left:0; top:0; transform-origin:0 0; will-change:transform; transform: {{ boardTransform }}; transition: {{ boardTransition }};\">\n\n      <div style=\"position:absolute; left:-3600px; top:-2800px; width:7200px; height:5600px; background-image: radial-gradient(var(--line-soft) 1.1px, transparent 1.1px); background-size: 28px 28px; pointer-events:none;\"><\u002Fdiv>\n      <div style=\"position:absolute; left:-1px; top:-2800px; width:1px; height:5600px; background:var(--line-soft); pointer-events:none;\"><\u002Fdiv>\n      <div style=\"position:absolute; left:-3600px; top:-1px; width:7200px; height:1px; background:var(--line-soft); pointer-events:none;\"><\u002Fdiv>\n\n      <sc-for list=\"{{ cards }}\" as=\"c\" hint-placeholder-count=\"5\">\n\n        <!-- ===== HOME ===== -->\n        <sc-if value=\"{{ c.isHome }}\" hint-placeholder-val=\"{{ true }}\">\n          <div data-card-root=\"1\" data-card-id=\"{{ c.id }}\" style=\"position:absolute; left:0; top:0; width:560px; transform: {{ c.transform }}; background:var(--bg-1); border:1px solid var(--line); border-radius:8px; box-shadow:var(--elev-rail); padding:22px 24px; display:flex; flex-direction:column; gap:15px; cursor:grab;\">\n            <div style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:12px;\">\n              <div style=\"display:flex; flex-direction:column; gap:7px;\">\n                <div style=\"font-size:11px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-3);\">Inkboard · {{ locLabel }}<\u002Fdiv>\n                <div style=\"height:9px; width:150px; background:repeating-linear-gradient(90deg, var(--fg-4) 0 1px, transparent 1px 16px); opacity:0.85;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; align-items:flex-end; gap:2px;\">\n                <div style=\"font-size:30px; font-weight:500; line-height:1; color:var(--accent);\">{{ clockHHMM }}<\u002Fdiv>\n                <div style=\"font-size:11px; color:var(--fg-3); letter-spacing:0.06em;\">{{ clockSS }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; flex-direction:column; gap:10px;\">\n              <div style=\"font-size:34px; font-weight:600; line-height:1.1; letter-spacing:-0.01em; color:var(--fg-1);\">{{ greeting }}, Tommy.<\u002Fdiv>\n              <div data-nodrag=\"1\" style=\"display:flex; align-items:center; gap:8px;\">\n                <button data-nodrag=\"1\" onclick=\"{{ prevDay }}\" style=\"width:26px; height:26px; background:var(--well); border:1px solid var(--line); border-radius:4px; color:var(--fg-2); font-size:14px; cursor:pointer; display:grid; place-items:center;\" style-hover=\"background:var(--well-hi); color:var(--fg-1);\">‹<\u002Fbutton>\n                <span style=\"font-size:13px; color:var(--fg-2); min-width:170px; text-align:center; letter-spacing:0.02em;\">{{ selDateLabel }}<\u002Fspan>\n                <button data-nodrag=\"1\" onclick=\"{{ nextDay }}\" style=\"width:26px; height:26px; background:var(--well); border:1px solid var(--line); border-radius:4px; color:var(--fg-2); font-size:14px; cursor:pointer; display:grid; place-items:center;\" style-hover=\"background:var(--well-hi); color:var(--fg-1);\">›<\u002Fbutton>\n                <sc-if value=\"{{ notToday }}\" hint-placeholder-val=\"{{ true }}\">\n                  <button data-nodrag=\"1\" onclick=\"{{ goToday }}\" style=\"height:26px; padding:0 10px; background:transparent; border:1px solid var(--accent-dim); border-radius:4px; color:var(--accent); font-size:11px; letter-spacing:0.06em; cursor:pointer;\">today<\u002Fbutton>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n ackground:var(--bg-1); border:1px solid var(--line); border-radius:8px;\"><span style=\"font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-3);\">Strain<\u002Fspan><span style=\"font-size:24px; font-weight:600; color:var(--fg-1);\">{{ hStrain }}<\u002Fspan><span style=\"font-size:11px; color:var(--fg-3);\">{{ hStrainLabel }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:5px; padding:15px; background:var(--bg-1); border:1px solid var(--line); border-radius:8px;\"><span style=\"font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-3);\">Resting HR<\u002Fspan><span style=\"font-size:24px; font-weight:600; color:var(--fg-1);\">{{ hRestHr }}<\u002Fspan><span style=\"font-size:11px; color:var(--fg-3);\">bpm<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:5px; padding:15px; background:var(--bg-1); border:1px solid var(--line); border-radius:8px;\"><span style=\"font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-3);\">HRV<\u002Fspan><span style=\"font-size:24px; font-weight:600; color:var(--fg-1);\">{{ hHrv }}<\u002Fspan><span style=\"font-size:11px; color:var(--fg-3);\">ms<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <!-- what this means -->\n            <div style=\"display:flex; gap:14px; padding:18px; background:var(--bg-1); border:1px solid var(--line); border-radius:8px;\">\n              <span style=\"flex:none; width:3px; align-self:stretch; background:{{ hReadyColor }}; border-radius:2px;\"><\u002Fspan>\n              <div style=\"display:flex; flex-direction:column; gap:6px;\"><span style=\"font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-4);\">What this means today<\u002Fspan><span style=\"font-size:13px; color:var(--fg-2); line-height:1.6;\">{{ hCoachBody }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- 02Fspan><span style=\"font-size:30px; font-weight:600; color:{{ hRecoveryColor }};\">{{ hRecovery }}<\u002Fspan><\u002Fdiv>\n              <sc-for list=\"{{ recoveryDrivers }}\" as=\"d\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex; align-items:center; gap:12px; padding:9px 0; border-top:1px solid var(--line-soft);\"><span style=\"flex:none; width:3px; height:18px; background:{{ d.color }}; border-radius:2px;\"><\u002Fspan><span style=\"flex:1; font-size:13px; color:var(--fg-1);\">{{ d.k }}<\u002Fspan><span style=\"font-size:12px; color:{{ d.color }};\">{{ d.txt }}<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n              <span style=\"font-size:10px; color:var(--fg-4); line-height:1.5;\">Recovery is derived from your sleep score, HRV and resting heart rate vs your trailing baseline — an approximation, not a Garmin-native number.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- STRAIN -->\n          <sc-if value=\"{{ showHStrain }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; flex-direction:column; gap:10px; padding:20px; background:var(--bg-1); border:1px solid var(--line); border-radius:8px;\">\n              <span style=\"font-size:11px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-2);\">Training strain <span style=\"color:var(--fg-4);\">· derived<\u002Fspan><\u002Fspan>\n              <div style=\"display:flex; align-items:flex-end; gap:14px;\"><span style=\"font-size:48px; font-weight:600; line-height:0.85; color:var(--fg-1);\">{{ hStrain }}<\u002Fspan><span style=\"font-size:13px; color:var(--fg-3); padding-bottom:6px;\">/ 21 · {{ hStrainLabel }}<\u002Fspan><\u002Fdiv>\n              <span style=\"font-size:12px; color:var(--fg-3); line-height:1.6;\">Estimated from your recent running load (last 7 days vs your weekly goal). Pair it with recovery: high strain + low recovery is the signal to back off.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- NUTRITION -->\n          <sc-if value=\"{{ showHNutrition }}\" hint-placeholder-val=\"{{ false }}\">\n            <!-- sync status banner -->\n            <div style=\"display:flex; align-items:center; gap:13px; padding:12px 15px; background:{{ nutSyncBannerBg }}; border:1px solid {{ nutSyncBannerBorder }}; border-radius:7px;\">\n              <span style=\"flex:none; width:8px; height:8px; border-radius:50%; background:{{ nutSyncDotColor }};\"><\u002Fspan>\n              <div style=\"flex:1; min-width:0; display:flex; flex-direction:column; gap:2px;\">\n                <span style=\"font-size:12px; color:var(--fg-1);\">{{ nutSyncLabel }}<\u002Fspan>\n                <span style=\"font-size:10px; color:var(--fg-4); line-height:1.4;\">{{ nutSyncSub }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ nutSyncShowResync }}\" hint-placeholder-val=\"{{ false }}\">\n                <button data-nodrag=\"1\" onclick=\"{{ onNutResync }}\" title=\"re-pull synced nutrition\" style=\"flex:none; height:30px; padding:0 13px; background:{{ nutSyncResyncBg }}; border:1px solid {{ nutSyncResyncBorder }}; border-radius:5px; color:{{ nutSyncResyncFg }}; font-size:11px; font-weight:600; letter-spacing:0.04em; cursor:pointer;\">↻ resync<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <!-- view toggle -->\n            <div style=\"display:flex; align-items:center; gap:10px;\">\n              <div style=\"display:flex; gap:6px;\">\n                <button data-nodrag=\"1\" onclick=\"{{ onNutDay }}\" style=\"height:30px; padding:0 16px; border-radius:6px; border:1px solid {{ nutDayTabStyle.borderColor }}; background:{{ nutDayTabStyle.bg }}; color:{{ nutDayTabStyle.fg }}; font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;\">Day<\u002Fbutton>\n                <button data-nodrag=\"1\" onclick=\"{{ onNutWeek }}\" style=\"height:30px; padding:0 16px; border-radius:6px; border:1px solid {{ nutWeekTabStyle.borderColor }}; background:{{ nutWeekTabStyle.bg }}; color:{{ nutWeekTabStyle.fg }}; font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;\">Week<\u002Fbutton>\n              <\u002Fdiv>\n              <span style=\"flex:1;\"><\u002Fspan>\n              <sc-if value=\"{{ nutIsDay }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex; align-items:center; gap:4px;\">\n                  <button data-nodrag=\"1\" onclick=\"{{ onNutPrev }}\" style=\"width:28px; height:28px; display:grid; place-items:center; background:transparent; border:1px solid var(--line); border-radius:5px; color:var(--fg-2); font-size:14px; cursor:pointer;\" style-hover=\"background:var(--well);\">‹<\u002Fbutton>\n                  <span style=\"min-width:84px; text-align:center; font-size:12px; color:var(--fg-1); letter-spacing:0.04em;\">{{ nutDateLabel }}<\u002Fspan>\n                  <button data-nodrag=\"1\" onclick=\"{{ onNutNext }}\" style=\"width:28px; height:28px; display:grid; place-items:center; background:transparent; border:1px solid var(--line); border-radius:5px; color:var(--fg-2); font-size:14px; cursor:pointer;\" style-hover=\"background:var(--well);\">›<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <!-- ===== DAY VIEW ===== -->\n            <sc-if value=\"{{ nutIsDay }}\" hint-placeholder-val=\"{{ true }}\">\n              <!-- hero: calorie ring + coverage -->\n              <div style=\"display:flex; flex-wrap:wrap; gap:18px; align-items:center; padding:22px; background:var(--bg-1); border:1px solid var(--line); border-radius:8px;\">\n                <div style=\"position:relative; width:120px; height:120px; flex:none;\">\n                  <svg width=\"120\" height=\"120\" viewBox=\"0 0 100 100\">\n                    <circle cx=\"50\" cy=\"50\" r=\"45\" fill=\"none\" stroke=\"var(--well)\" stroke-width=\"9\"><\u002Fcircle>\n                    <circle cx=\"50\" cy=\"50\" r=\"45\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"9\" stroke-linecap=\"round\" stroke-dasharray=\"{{ nutRingDash }}\" transform=\"rotate(-90 50 50)\"><\u002Fcircle>\n                  <\u002Fsvg>\n                  <div style=\"position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;\">\n                    <span style=\"font-size:26px; font-weight:600; color:var(--fg-1); line-height:1;\">{{ nutKcal }}<\u002Fspan>\n                    <span style=\"font-size:10px; color:var(--fg-3);\">/ {{ nutKcalTgt }} kcal<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:1; min-width:160px; display:flex; flex-direction:column; gap:8px;\">\n                  <div style=\"display:flex; align-items:center; gap:9px;\">\n                    <span style=\"font-size:11px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-2);\">Today's intake<\u002Fspan>\n                    <span style=\"font-size:10px; padding:2px 8px; border-radius:10px; border:1px solid {{ nutCoverageColor }}; color:{{ nutCoverageColor }};\">{{ nutCoverage }}% coverage<\u002Fspan>\n                  <\u002Fdiv>\n                  <span style=\"font-size:13px; color:var(--fg-3); line-height:1.5;\">{{ nutKcalLeft }} kcal left · {{ nutKcalPctLabel }} of target<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- macro bars -->\n              <div style=\"display:flex; flex-direction:column; gap:14px; padding:20px; background:var(--bg-1); border:1px solid var(--line); border-radius:8px;\">\n                <span style=\"font-size:11px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-2);\">Macros<\u002Fspan>\n                <sc-for list=\"{{ nutMacros }}\" as=\"m\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex; flex-direction:column; gap:6px;\">\n                    <div style=\"display:flex; align-items:baseline; justify-content:space-between;\">\n                      <span style=\"font-size:13px; color:var(--fg-1);\">{{ m.label }}<\u002Fspan>\n                      <span style=\"font-size:12px; color:var(--fg-3); font-variant-numeric:tabular-nums;\">{{ m.val }} / {{ m.tgt }}g · {{ m.pctLabel }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"height:7px; border-radius:4px; background:var(--well); overflow:hidden;\"><div style=\"height:100%; width:{{ m.pct }}; background:{{ m.barColor }}; border-radius:4px;\"><\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <!-- cholesterol + water -->\n                <div style=\"display:flex; gap:18px; flex-wrap:wrap; padding-top:6px; border-top:1px solid var(--line-soft);\">\n                  <div style=\"flex:1; min-width:140px; display:flex; flex-direction:column; gap:6px;\">\n                    <div style=\"display:flex; align-items:baseline; justify-content:space-between;\"><span style=\"font-size:13px; color:var(--fg-1);\">Cholesterol<\u002Fspan><span style=\"font-size:12px; color:var(--fg-3); font-variant-numeric:tabular-nums;\">{{ nutChol }} / {{ nutCholTgt }}mg<\u002Fspan><\u002Fdiv>\n                    <div style=\"height:7px; border-radius:4px; background:var(--well); overflow:hidden;\"><div style=\"height:100%; width:{{ nutCholPct }}; background:{{ nutCholColor }}; border-radius:4px;\"><\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex:1; min-width:140px; display:flex; flex-direction:column; gap:6px;\">\n                    <div style=\"display:flex; align-items:baseline; justify-content:space-between;\"><span style=\"font-size:13px; color:var(--fg-1);\">Water<\u002Fspan><span style=\"font-size:12px; color:var(--fg-3); font-variant-numeric:tabular-nums;\">{{ nutWaterLabel }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"height:7px; border-radius:4px; background:var(--well); overflow:hidden;\"><div style=\"height:100%; width:{{ nutWaterPct }}; background:#7ea6c9; border-radius:4px;\"><\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- insights -->\n              <sc-if value=\"{{ nutHasInsights }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex; flex-direction:column; gap:12px; padding:18px; background:var(--bg-1); border:1px solid var(--line); border-radius:8px;\">\n                  <span style=\"font-size:11px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-2);\">Feedback<\u002Fspan>\n                  <sc-for list=\"{{ nutInsights }}\" as=\"b\" hint-placeholder-count=\"2\">\n                    <div style=\"display:flex; gap:11px;\">\n                      <span style=\"flex:none; width:3px; align-self:stretch; min-height:30px; background:{{ b.dot }}; border-radius:2px;\"><\u002Fspan>\n                      <div style=\"display:flex; flex-direction:column; gap:2px; min-width:0;\">\n                        <div style=\"display:flex; align-items:center; gap:7px;\"><span style=\"font-size:8px; font-weight:600; letter-spacing:0.1em; color:{{ b.dot }};\">{{ b.toneLabel }}<\u002Fspan><\u002Fdiv>\n                        <span style=\"font-size:13px; color:var(--fg-1); line-height:1.45;\">{{ b.what }}<\u002Fspan>\n                        <span style=\"font-size:11px; color:var(--fg-3); line-height:1.5;\">{{ b.why }}<\u002Fspan>\n                        <span style=\"font-size:11px; color:var(--accent); line-height:1.5;\">→ {{ b.next }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <!-- meal log -->\n              <sc-if value= 11px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-2);\">Savings goals<\u002Fspan>\n                    <button data-nodrag=\"1\" onclick=\"{{ onAddGoal }}\" style=\"height:30px; padding:0 13px; background:var(--accent); border:0; border-radius:6px; color:var(--accent-ink); font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;\">+ Goal<\u002Fbutton>\n                  <\u002Fdiv>\n                  <div style=\"display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:14px;\">\n                    <sc-for list=\"{{ goalRows }}\" as=\"g\" hint-placeholder-count=\"3\">\n                      <button data-nodrag=\"1\" onclick=\"{{ g.onEdit }}\" style=\"display:flex; flex-direction:column; gap:10px; padding:18px; background:var(--bg-1); border:1px solid var(--line); border-radius:8px; cursor:pointer; text-align:left;\" style-hover=\"border-color:var(--line-hard);\">\n                        <div style=\"display:flex; justify-content:space-between; align-items:baseline;\"><span style=\"font-size:14px; font-weight:600; color:var(--fg-1);\">{{ g.name }}<\u002Fspan><span style=\"font-size:11px; color:var(--fg-3);\">{{ g.dateLabel }}<\u002Fspan><\u002Fdiv>\n                        <span style=\"font-size:22px; font-weight:600; color:var(--fg-1);\">{{ g.currentLabel }} <span style=\"font-size:13px; color:var(--fg-3);\">/ {{ g.targetLabel }}<\u002Fspan><\u002Fspan>\n                        <div style=\"height:8px; border-radius:4px; background:var(--well); overflow:hidden;\"><div style=\"height:100%; width:{{ g.barW }}; background:var(--accent);\"><\u002Fdiv><\u002Fdiv>\n                        <span style=\"font-size:11px; color:var(--fg-3);\">{{ g.pctLabel }} · {{ g.remainingLabel }}<\u002Fspan>\n                      <\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- ============ INVESTING  letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-3);\">Subcategory (optional)<\u002Fspan><input data-nodrag=\"1\" value=\"{{ draft.subcategory }}\" oninput=\"{{ onDraft.subcategory }}\" placeholder=\"e.g. Snacks, Gas, Coffee\" style=\"height:38px; background:var(--well); border:1px solid var(--line-hard); border-radius:6px; color:var(--fg-1); font-size:13px; padding:0 12px; outline:none;\" style-focus=\"border-color:var(--accent);\"><\u002Flabel>\n                  <span style=\"font-size:10px; color:var(--fg-4); line-height:1.5;\">Change the category and Inkboard remembers this merchant for next time.<\u002Fspan>\n                <\u002Fsc-if>\n                <!-- budget fields -->\n                <sc-if value=\"{{ finEditIsBudget }}\" hint-placeholder-val=\"{{ false }}\">\n                  <label style=\"display:flex; flex-direction:column; gap:6px;\"><span style=\"font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-3);\">Category<\u002Fspan><input data-nodrag=\"1\" value=\"{{ draft.category }}\" oninput=\"{{ onDraft.category }}\" placeholder=\"e.g. Groceries\" style=\"height:38px; background:var(--well); border:1px solid var(--line-hard); border-radius:6px; color:var(--fg-1); font-size:13px; padding:0 12px; outline:none;\" style-focus=\"border-color:var(--accent);\"><\u002Flabel>\n                  <label style=\"display:flex; flex-direction:column; gap:6px;\"><span style=\"font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-3);\">Monthly target (USD)<\u002Fspan><input data-nodrag=\"1\" type=\"number\" value=\"{{ draft.monthly_amount }}\" oninput=\"{{ onDraftNum.monthly_amount }}\" style=\"height:38px; background:var(--well); border:1px solid var(--line-hard); border-radius:6px; color:var(--fg-1); font-size:13px; padding:0 12px; outline:none;\" style-focus=\"border-color:var(--accent);\"><\u002Flabel>\n                <\u002Fsc-if>\n                <!-- goal fields -->\n                <sc :13px; padding:0 12px; outline:none;\" style-focus=\"border-color:var(--accent);\"><\u002Flabel>\n                  <label style=\"display:flex; flex-direction:column; gap:6px;\"><span style=\"font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-3);\">Market value (USD)<\u002Fspan><input data-nodrag=\"1\" type=\"number\" value=\"{{ draft.value }}\" oninput=\"{{ onDraftNum.value }}\" style=\"height:38px; background:var(--well); border:1px solid var(--line-hard); border-radius:6px; color:var(--fg-1); font-size:13px; padding:0 12px; outline:none;\" style-focus=\"border-color:var(--accent);\"><\u002Flabel>\n                  <label style=\"display:flex; flex-direction:column; gap:6px;\"><span style=\"font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-3);\">Cost basis (USD)<\u002Fspan><input data-nodrag=\"1\" type=\"number\" value=\"{{ draft.cost_basis }}\" oninput=\"{{ onDraftNum.cost_basis }}\" style=\"height:38px; background:var(--well); border:1px solid var(--line-hard); border-radius:6px; color:var(--fg-1); font-size:13px; padding:0 12px; outline:none;\" style-focus=\"border-color:var(--accent);\"><\u002Flabel>\n                <\u002Fsc-if>\n\n                <div style=\"display:flex; gap:8px; margin-top:6px;\">\n                  <button data-nodrag=\"1\" onclick=\"{{ onSaveFin }}\" style=\"flex:1; height:40px; background:var(--accent); border:0; border-radius:6px; color:var(--accent-ink); font-size:12px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;\" style-hover=\"filter:brightness(1.06);\">Save<\u002Fbutton>\n                  <button data-nodrag=\"1\" onclick=\"{{ onDeleteFin }}\" style=\"flex:none; height:40px; padding:0 14px; background:transparent; border:1px solid var(--line); border-radius:6px; color:var(--fg-3); font-size:11px; letter-spacing:0.06em; cursor:pointer;\" style-hover=\"border-color:var(--accent-dim); color:var(--accent);\">Delete<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== SETTINGS ===== -->\n  <sc-if value=\"{{ showSettings }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute; inset:0; z-index:60; background:var(--bg-0); display:flex; flex-direction:column;\">\n      <div style=\"flex:none; height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 18px; border-bottom:1px solid var(--line); background:var(--bg-1);\">\n        <div style=\"display:flex; align-items:center; gap:11px;\">\n          <span style=\"color:var(--accent); font-size:14px;\">⚙<\u002Fspan>\n          <span style=\"font-size:12px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:var(--fg-1);\">Settings<\u002Fspan>\n        <\u002Fdiv>\n        <button data-nodrag=\"1\" onclick=\"{{ onCloseOverlay }}\" style=\"height:30px; padding:0 12px; background:transparent; border:1px solid var(--line); border-radius:4px; color:var(--fg-1); font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer;\" style-hover=\"background:var(--well);\">Done<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"flex:1; overflow-y:auto; padding:28px 18px;\">\n        <div style=\"max-width:620px; margin:0 auto; display:flex; flex-direction:column; gap:30px;\">\n\n          <!-- ACCOUNT -->\n          <div style=\"display:flex; flex-direction:column; gap:13px;\">\n            <div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"font-size:11px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-2);\">Account<\u002Fspan><span style=\"flex:1; height:0; border-top:1px solid var(--line);\"><\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; background:var(--bg-1); border:1px solid var(--line); border-radius:8px;\">\n              <div style=\"display:flex; flex-direction:column; gap:3px; min-width:0;\">\n                <span style=\"font-size:13px; color:var(--fg-1); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ userEmail }}<\u002Fspan>\n                <span style=\"font-size:11px; color:var(--fg-3);\">synced · {{ cloudStatus }}<\u002Fspan>\n              <\u002Fdiv>\n              <button data-nodrag=\"1\" onclick=\"{{ signOut }}\" style=\"flex:none; height:30px; padding:0 13px; background:transparent; border:1px solid var(--line); border-radius:5px; color:var(--fg-2); font-size:11px; letter-spacing:0.06em; cursor:pointer;\" style-hover=\"border-color:var(--accent-dim); color:var(--accent);\">Sign out<\u002Fbutton>\n            <\u002Fdiv>\n            <!-- set / change account password -->\n            <div style=\"display:flex; flex-direction:column; gap:10px; padding:14px 16px; background:var(--bg-1); border:1px solid var(--line); border-radius:8px;\">\n              <div style=\"display:flex; flex-direction:column; gap:3px;\">\n                <span style=\"font-size:13px; color:var(--fg-1);\">Account password<\u002Fspan>\n                <span style=\"font-size:11px; color:var(--fg-3); line-height:1.5;\">Set or change the password for this account — it keeps all your data, just lets you sign in with email + password.<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:8px; flex-wrap:wrap;\">\n                <input data-nodrag=\"1\" type=\"password\" autocomplete=\"new-password\" value=\"{{ acctPw }}\" oninput=\"{{ onAcctPw }}\" onkeydown=\"{{ onAcctPwKey }}\" placeholder=\"new password (6+ chars)\" style=\"flex:1; min-width:160px; height:34px; background:var(--well); border:1px solid var(--line-hard); border-radius:5px; color:var(--fg-1); font-size:13px; padding:0 11px; outline:none;\" style-focus=\"border-color:var(--accent);\">\n                <button ult }}\" title=\"toggle vault password\" style=\"width:40px; height:22px; border-radius:11px; background:{{ vaultTrack }}; position:relative; flex:none; border:0; cursor:pointer; transition:background 130ms;\"><span style=\"position:absolute; top:2px; left:{{ vaultKnob }}; width:18px; height:18px; border-radius:50%; background:var(--fg-1); transition:left 130ms;\"><\u002Fspan><\u002Fbutton>\n            <\u002Fdiv>\n            <sc-if value=\"{{ vaultEnabled }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; background:var(--bg-1); border:1px solid var(--line); border-radius:8px;\">\n                <div style=\"display:flex; flex-direction:column; gap:3px;\">\n                  <span style=\"font-size:13px; color:var(--fg-1);\">Password<\u002Fspan>\n                  <span style=\"font-size:11px; color:var(--fg-3);\">change or reset it anytime — you're signed in<\u002Fspan>\n                <\u002Fdiv>\n                <button data-nodrag=\"1\" onclick=\"{{ onChangePw }}\" style=\"flex:none; height:30px; padding:0 13px; background:transparent; border:1px solid var(--line); border-radius:5px; color:var(--fg-2); font-size:11px; letter-spacing:0.06em; cursor:pointer;\" style-hover=\"border-color:var(--accent-dim); color:var(--accent);\">Change password<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:10px; padding:14px 16px; background:var(--bg-1); border:1px solid var(--line); border-radius:8px;\">\n                <span style=\"font-size:13px; color:var(--fg-1);\">Auto-relock after inactivity<\u002Fspan>\n                <div style=\"display:flex; flex-wrap:wrap; gap:6px;\">\n                  <sc-for list=\"{{ relockOpts }}\" as=\"r\" hint-placeholder-count=\"5\">\n                    <button data-nodrag=\"1\" onclick=\"{{ r.onSelect }}\" style=\"height:28px; padding:0 13px; border-radius:5px; dirs[Math.round((deg % 360) / 45) % 8];\n  }\n\n  activeLoc() {\n    return this.state.locations.find(l => l.id === this.state.locId) || this.state.locations[0];\n  }\n\n  loadWeather() {\n    const loc = this.activeLoc();\n    if (!loc) return;\n    const cacheKey = 'inkboard:wx:' + loc.id;\n    try {\n      const cached = localStorage.getItem(cacheKey);\n      if (cached) { const w = JSON.parse(cached); if (w && typeof w === 'object') this.setState({ weather: w }); }\n    } catch (e) {}\n    clearInterval(this._wxTimer);\n    const fetchNow = async () => {\n      const cur_loc = this.activeLoc();\n      if (!cur_loc) return;\n      try {\n        const url = `https://api.open-meteo.com/v1/forecast?latitude=${cur_loc.lat}&longitude=${cur_loc.lon}`\n          + '&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m'\n          + '&hourly=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min'\n          + '&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FNew_York&forecast_days=2';\n        const res = await fetch(url);\n        if (!res.ok) return;\n        const d = await res.json();\n        const cur = d.current || {};\n        const [condition, glyph] = this.wxInfo(cur.weather_code);\n        // next 6 hours from the hourly series\n        const times = (d.hourly && d.hourly.time) || [];\n        const now = new Date();\n        let start = times.findIndex(t => new Date(t) >= now);\n        if (start < 0) start = 0;\n        const hourly = [];\n        for (let i = start; i < start + 6 && i < times.length; i++) {\n          const hd = new Date(times[i]);\n          let h = hd.getHours(); const ap = h < 12 ? 'a' : 'p'; let hr = h % 12; if (hr === 0) hr = 12;\n          const [, g] = this.wxInfo(d.hourly.weather_code[i]);\n          hourly.push({ t: hr + ap, g, temp: Math.round(d.hourly.temperature_2m[i]) + '°' });\n        }\n        const weather = {\n          temp: Math.round(cur.temperature_2m),\n          feels: Math.round(cur.apparent_temperature),\n          condition, glyph,\n          hi: Math.round(d.daily.temperature_2m_max[0]),\n          lo: Math.round(d.daily.temperature_2m_min[0]),\n          windSpeed: Math.round(cur.wind_speed_10m),\n          windDir: this.compass(cur.wind_direction_10m),\n          hourly: hourly.length ? hourly : this.state.weather.hourly,\n          live: true, updated: Date.now(),\n        };\n        // ignore if the user switched locations mid-fetch\n        if (this.activeLoc() && this.activeLoc().id !== cur_loc.id) return;\n        this.setState({ weather });\n        try { localStorage.setItem('inkboard:wx:' + cur_loc.id, JSON.stringify(weather)); } catch (e) {}\n      } catch (e) { /* offline — keep cached/seed values */ }\n    };\n    fetchNow();\n    this._wxTimer = setInterval(fetchNow, 30 * 60 * 1000);\n  }\n\n  selectLocation(id) {\n    if (id === this.state.locId) { this.setState({ showLoc: false }); return; }\n    this.setState({ locId: id, showLoc: false, locStatusText: '' }, () => { this.persist(); this.loadWeather(); });\n  }\n  removeLocation(id) {\n    this.setState(s => {\n      const locations = s.locations.filter(l => l.id !== id);\n      const locId = s.locId === id ? (locations[0] && locations[0].id) : s.locId;\n      return { locations, locId };\n    }, () => { this.persist(); this.loadWeather(); });\n  }\n  async searchLocation() {\n    const q = (this.state.locQuery || '').trim();\n    if (!q) return;\n    this.setState({ locStatusText: 'searching…' });\n    try {\n      const res = await fetch('https://geocoding-api.open-meteo.com/v1/search?count=1&language=en&format=json&name=' + encodeURIComponent(q));\n      const d = await res.json();\n      const r = d.results && d.results[0];\n      if (!r) { this.setState({ locStatusText: 'no match for “' + q + '”' }); return; }\n      const region = r.admin1 || r.country_code || r.country || '';\n      const loc = { id: 'g' + this.uid(), name: r.name, region, lat: r.latitude, lon: r.longitude, fixed: false };\n      this.setState(s => ({ locations: [...s.locations, loc], locId: loc.id, locQuery: '', locStatusText: '', showLoc: false }),\n        () => { this.persist(); this.loadWeather(); });\n    } catch (e) { this.setState({ locStatusText: 'search failed — offline?' }); }\n  }\n\n  pad2(n) { return String(n).padStart(2, '0'); }\n  keyOf(d) { return `${d.getFullYear()}-${this.pad2(d.getMonth() + 1)}-${this.pad2(d.getDate())}`; }\n  todayKey() { return this.keyOf(new Date()); }\n  relKey(days) { const d = new Date(); d.setDate(d.getDate() + days); return this.keyOf(d); }\n  parseKey(k) { const [y, m, d] = k.split('-').map(Number); return new Date(y, m - 1, d); }\n\n  // ============ CLOUD SYNC (Supabase) ============\n  SB_URL = 'https://xspojczmywydubmttued.supabase.co';\n  SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzcG9qY3pteXd5ZHVibXR0dWVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4OTA2NjQsImV4cCI6MjA5NzQ2NjY2NH0.QJLeB0kr-CTvGJ3Ey6EJ8xutKs4uo7S5UHfm0gEorCI';\n\n  initCloud() {\n    const start = () => {\n      if (!window.supabase || !window.supabase.createClient) { this._sbTry = (this._sbTry || 0) + 1; if (this._sbTry < 80) return void setTimeout(start, 100); this.setState({ authReady: true }); return; }\n      this._sb = window.supabase.createClient(this.SB_URL, this.SB_KEY, {\n        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, storage: window.localStorage },\n      });\n      this._clientId = Math.random().toString(36).slice(2);\n      this._sb.auth.getSession().then(({ data }) => {\n        const user = data && data.session ? data.session.user : null;\n        this.setState({ authReady: true, user });\n        if (user) this.afterLogin();\n      }).catch(() => this.setState({ authReady: true }));\n      this._sb.auth.onAuthStateChange((_evt, session) => {\n        const user = session ? session.user : null;\n        const had = !!this.state.user;\n        this.setState({ user, loginErr: '', loginPhase: user ? 'idle' : this.state.loginPhase });\n        if (user && !had) this.afterLogin();\n        if (!user && had) { this.teardownRealtime(); }\n      });\n    };\n    start();\n  }\n\n  async afterLogin() {\n    this.setState({ cloudStatus: 'syncing…' });\n    try {\n      const { data } = await this._sb.from('boards').select('data').eq('user_id', this.state.user.id).maybeSingle();\n      if (data && data.data && Array.isArray(data.data.cards)) {\n        this.applyCloud(data.data);\n      } else {\n        await this.saveCloud(true); // first login on this account → seed it from current board\n      }\n    } catch (e) { this.setState({ cloudStatus: 'offline' }); }\n    this.subscribeRealtime();\n    this.fetchSleep();\n    this.fetchRunning();\n    this.fetchNutrition();\n    this.subscribeNutrition();\n    this.setState({ cloudStatus: 'synced' });\n  }\n\n  // Pull the latest night's sleep/recovery row written by the Garmin sync job.\n  // Caches the last good value to localStorage so the card survives offline / sync gaps.\n  // Resilient sleep/recovery fetch: cache-first, pulls the latest night + ~30-day history\n  // for trends. Never queries garmin_sync_state (derives freshness from the row date).\n  async fetchSleep() {\n    try {\n      const cached = localStorage.getItem('inkboard:sleep');\n      if (cached && !this.state.sleep) { const c = JSON.parse(cached); this.setState({ sleep: c.row, sleepHistory: c.hist || [], sleepSyncedAt: c.at }); }\n    } catch (e) {}\n    if (this._sb && this.state.user) {\n      try {\n        const { data } = await this._sb.from('sleep').select('*').eq('user_id', this.state.user.id).order('date', { ascending: false }).limit(30);\n        if (Array.isArray(data) && data.length) {\n          // Unit-proof: a Shortcut may send sleep durations in seconds. If a duration looks\n          // like seconds (>1000 = >16h in minutes, impossible), convert to minutes.\n          const fix = v => (typeof v === 'number' && v > 1000) ? Math.round(v / 60) : v;\n          // 0 from the Shortcut means \"no sample found\", not a real reading — treat as missing.\n          const z = v => (v === 0 || v == null) ? null : v;\n          const norm = r => {\n            const o = { ...r, duration_min: fix(r.duration_min), deep_min: fix(r.deep_min), rem_min: fix(r.rem_min), light_min: fix(r.light_min), awake_min: fix(r.awake_min), hrv: z(r.hrv), resting_hr: z(r.resting_hr), body_battery: z(r.body_battery), score: z(r.score) };\n            // Apple Health / Bevel rarely expose a numeric \"sleep score\" — derive one from\n            // duration (+ efficiency from awake time) so the field is meaningful, flagged derived.\n            if (o.score == null && o.duration_min) {\n              let sc = Math.max(0, Math.min(100, (o.duration_min / 480) * 100)); // 8h = 100\n              if (o.awake_min != null && o.duration_min > 0) { const eff = Math.max(0, 1 - o.awake_min / (o.duration_min + o.awake_min)); sc *= (0.85 + 0.15 * eff); }\n              o.score = Math.round(sc); o.score_derived = true;\n            }\n            return o;\n          };\n          const all = data.map(norm);\n          const row = all[0], hist = all.slice().reverse();\n          this.setState({ sleep: row, sleepHistory: hist, sleepSyncedAt: Date.now() });\n          try { localStorage.setItem('inkboard:sleep', JSON.stringify({ row, hist, at: Date.now() })); } catch (e) {}\n          return;\n        }\n      } catch (e) { /* keep cached */ }\n    }\n    // no rows yet → leave Health empty (real data arrives via the Apple Health / Bevel\n    // Shortcut that POSTs into the `sleep` table). No demo seeding.\n  }\n\n  // (demo health seeding removed — Health shows real Apple Health / Bevel data only)\n  seedHealthDemo() { /* disabled */ }\n\n  // Pull synced nutrition (Apple Health / Cronometer via the nutrition-ingest function).\n  // Stores each day's macro totals + micronutrients under nutrition.micros[date].\n  // Fully defensive: if the table doesn't exist yet, it silently no-ops.\n  async fetchNutrition() {\n    if (!this._sb || !this.state.user) return;\n    try {\n      const { data } = await this._sb.from('nutrition_days').select('*').eq('user_id', this.state.user.id).order('date', { ascending: false }).limit(60);\n      if (Array.isArray(data) && data.length) {\n        const micros = { ...(this.state.nutrition.micros || {}) };\n        data.forEach(r => {\n          const totals = { kcal: r.kcal || 0, protein: r.protein_g || 0, carbs: r.carbs_g || 0, fat: r.fat_g || 0, fiber: r.fiber_g || 0, cholesterol: r.cholesterol_mg || 0, water: r.water_ml || 0 };\n          const m = (r.micros && typeof r.micros === 'object') ? r.micros : {};\n          micros[r.date] = { totals, ...m };\n        });\n        // newest write across the synced rows — drives the sync-status banner freshness\n        const newest = data.map(r => r.updated_at).filter(Boolean).sort().pop() || null;\n        this.setState(s => ({ nutrition: { ...s.nutrition, micros }, nutSyncedAt: newest, nutSyncDays: data.length }), () => this.persist());\n      }\n    } catch (e) { /* nutrition_days table not set up yet — ignore */ }\n  }\n\n  // Manual resync — the ↻ button on the Nutrition status banner. Re-pulls from Supabase\n  // (the phone Shortcut is what actually writes; this just refreshes what's landed).\n  async resyncNutrition() {\n    if (this.state.nutSyncing) return;\n    this.setState({ nutSyncing: true });\n    try { await this.fetchNutrition(); } catch (e) {}\n    setTimeout(() => this.setState({ nutSyncing: false }), 450);\n  }\n\n  // Live-update the Nutrition view the moment a new day lands from the ingest function.\n  subscribeNutrition() {\n    if (!this._sb || !this.state.user || this._nchan) return;\n    try {\n      this._nchan = this._sb.channel('nut-' + this.state.user.id)\n        .on('postgres_changes', { event: '*', schema: 'public', table: 'nutrition_days', filter: 'user_id=eq.' + this.state.user.id }, () => this.fetchNutrition())\n        .subscribe();\n    } catch (e) { /* realtime not available — focus/poll still refresh */ }\n  }\n\n  // ============ DAILY REVIEW AGENT ============\n  // A private, on-device \"design review\" agent. Once a day it \"scans\" the app and files a\n  // queue of suggested improvements; you approve or pass each. Persisted to localStorage\n  // (key inkboard:review) so it survives reloads and is independent of any external service.\n  _reviewSeed() {\n    return {\n      lastScan: null,\n      items: [\n        { id:'s1', priority:'fix', category:'ux', confidence:'high', status:null,\n          title:'Health tabs overflow on narrow widths',\n          desc:'The seven Health tabs wrap to a second row under ~520px with no scroll affordance.',\n          why:'Nutrition and Coach get pushed below the fold — the tabs added most recently are the easiest to miss.',\n          improved:'Collapse to a single horizontally-scrollable tab strip with edge fades; the active tab always stays in view.',\n          before:'Today  Sleep  Recovery  Strain \\u23ce  Nutrition  Trends  Coach',\n          after:'\\u2039  Today  Sleep  Recovery  Strain  Nutrition  \\u203a' },\n        { id:'s2', priority:'fix', category:'copy', confidence:'high', status:null,\n          title:'\\u201cDerived\\u201d recovery score is unexplained',\n          desc:'Recovery shows a number tagged \\u201cderived\\u201d with no hint at what it\\u2019s derived from.',\n          why:'It\\u2019s easy to forget the score is computed from HRV, resting HR and sleep \\u2014 not a device number \\u2014 which changes how much you trust it.',\n          improved:'Add a one-line caption and an info glyph that names the inputs.',\n          before:'Recovery  72 \\u00b7 derived',\n          after:'Recovery  72 \\u00b7 est. from HRV \\u00b7 resting HR \\u00b7 sleep' },\n        { id:'s3', priority:'fix', category:'sync', confidence:'high', status:null,\n          title:'Running has no stale-data indicator',\n          desc:'Nutrition now shows \\u201clast sync N days ago\\u201d, but Running shows Strava data with no freshness signal.',\n          why:'A silently-stale Strava sync looks identical to fresh data, so a missed sync can quietly skew weekly load.',\n          improved:'Reuse the nutrition sync-status banner at the top of Running, with the same \\u21bb resync control.',\n          looksNote:'The same banner you already shipped for Nutrition \\u2014 green when fresh, amber past ~36h, one-tap resync.' },\n        { id:'s4', priority:'test', category:'nutrition', confidence:'medium', status:null,\n          title:'Surface micronutrient gaps in the daily brief',\n          desc:'Home\\u2019s daily brief never mentions vitamins or minerals, even when one is persistently low.',\n          why:'Iron under 60% for three days is exactly the slow signal the brief exists to catch \\u2014 right now it\\u2019s buried in the Nutrition tab.',\n          improved:'Add one brief line when a tracked micronutrient sits below 60% of target for 3+ days, tied to training load.',\n          before:'Daily brief: sleep, recovery, today\\u2019s plan.',\n          after:'Daily brief gains: \\u201cIron\\u2019s been under 60% three days running.\\u201d' },\n        { id:'s5', priority:'test', category:'productivity', confidence:'medium', status:null,\n          title:'Quick Capture should remember the last kind',\n          desc:'Capture always opens on \\u201cTask\\u201d, even if you mostly jot Notes.',\n          why:'A small friction repeated many times a day. The mode you used last is the best default for the next one.',\n          improved:'Default Quick Capture to the last-used kind; switching stays one tap.',\n          looksNote:'No new UI \\u2014 the toggle just remembers its last position per session.' },\n        { id:'s6', priority:'test', category:'performance', confidence:'medium', status:null,\ ation when a goal is met', when:'4 days ago' },\n        { id:'h4', outcome:'accepted', category:'copy', title:'Rewrite the login screen subtitle', when:'6 days ago' },\n        { id:'h5', outcome:'rejected', category:'productivity', title:'Add a Pomodoro timer to Home', when:'1 week ago' },\n      ],\n    };\n  }\n  _isOwner() { const u = this.state.user; return !!(u && u.email && u.email.toLowerCase() === 'thsrubinstein@gmail.com'); }\n  loadReview() {\n    let r = null;\n    try { const raw = localStorage.getItem('inkboard:review'); if (raw) r = JSON.parse(raw); } catch (e) {}\n    if (!r || !Array.isArray(r.items)) r = this._reviewSeed();\n    this.setState({ review: r }, () => this.ensureReviewScan());\n  }\n  persistReview() {\n    try { localStorage.setItem('inkboard:review', JSON.stringify(this.state.review)); } catch (e) {}\n  }\n  // Run the daily scan if it hasn't run today (or when triggered manually). \"Job done\" =>\n  // a notification (system, if permitted) + an in-app toast + a nav badge.\n  ensureReviewScan() {\n    if (!this._isOwner()) return;\n    const r = this.state.review; if (!r) return;\n    const today = this.todayKey ? this.todayKey() : new Date().toISOString().slice(0,10);\n    if (r.lastScan !== today) this.runReviewScan(false);\n  }\n  runReviewScan(manual) {\n    if (!this._isOwner()) return;\n    const today = this.todayKey ? this.todayKey() : new Date().toISOString().slice(0,10);\n    this.setState(s => ({ review: { ...s.review, lastScan: today } }), () => {\n      this.persistReview();\n      const n = (this.state.review.items || []).filter(i => !i.status).length;\n      this.notifyReview('Daily Review complete', n === 0 ? 'No new suggestions \\u2014 the app\\u2019s in good shape.' : `${n} suggestion${n===1?'':'s'} ready for your review.`);\n      this.setState({ reviewBadge: true });\n      this.flashReview(n === 0 ? 'Scan complete \\u00b7 nothing new today' : `Scan complete \\u00b7 ${n} new suggestion${n===1?'':'s'}`, 'scan');\n to the date\n    let account = null;\n    const acc = line.match(/\\b(chase|bank of america|bofa|wells\\s*fargo|td\\s*bank|td|citi(?:bank)?|capital\\s*one|amex|american\\s*express|discover|venmo|paypal|apple\\s*card|cash\\s*app|usaa|ally|sofi|navy\\s*federal|pnc|us\\s*bank|truist|fidelity|schwab)\\b[\\s\\w]*?(?=\\s*\\d{1,2}[\\/\\-]|$)/i);\n    if (acc) account = acc[0].replace(/\\s+/g, ' ').trim();\n    // title — text before the dash, else text before the amount\n    let title = line;\n    const dash = line.split(/\\s[-–—:]\\s/);\n    if (dash.length > 1) title = dash[0].trim();\n    else title = line.slice(0, am.index).trim();\n    title = title.replace(/[\\s\\-–—:]+$/, '').trim();\n    if (!title) title = 'Expense';\n    return { title, amount, cadence, account, date };\n  }\n  fmtMoney(n) { return '$' + (Number.isInteger(n) ? n : n.toFixed(2)); }\n  setCalChatDraft(v) { this.setState({ calChatDraft: v }); }\n  calChatSend() {\n    const text = (this.state.calChatDraft || '').trim();\n    if (!text) return;\n    const lines = text.split(/\\n+/).map(l => l.trim()).filter(Boolean);\n    const expenses = [];\n    lines.forEach(l => { const e = this.parseExpenseLine(l); if (e) expenses.push(e); });\n    let reply; const newEvents = [];\n    if (expenses.length) {\n      expenses.forEach(x => {\n        const amtStr = this.fmtMoney(x.amount) + this._cadenceSuffix(x.cadence);\n        const noteBits = [];\n        if (x.account) noteBits.push(x.account);\n        if (x.cadence) noteBits.push('recurring · ' + x.cadence);\n        newEvents.push({ id: this.uid(), title: x.title + ' · ' + amtStr, date: x.date, time: null, durationMin: null, notes: noteBits.join(' · ') || null, kind: 'expense', _rev: Date.now() });\n      });\n      const summary = expenses.map(x => x.title + ' (' + this.fmtMoney(x.amount) + ') — ' + this.relLabel(x.date)).join('\\n• ');\n      reply = 'Added ' + expenses.length + ' expense' + (expenses.length > 1 ? 's' : '') + ' to the calendar:\\n• ' + s
