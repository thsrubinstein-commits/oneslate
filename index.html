e => e.date === k).sort((a, b) => { if (!a.time && !b.time) return 0; if (!a.time) return -1; if (!b.time) return 1; return a.time < b.time ? -1 : 1; }).map(evView);\n    const cur = this.state.calCursor || tk.slice(0, 7);\n    const [cy, cm] = cur.split('-').map(Number);\n    const first = new Date(cy, cm - 1, 1); const startDow = first.getDay();\n    const gridStart = new Date(cy, cm - 1, 1 - startDow);\n    const cells = [];\n    for (let i = 0; i < 42; i++) {\n      const d = new Date(gridStart); d.setDate(gridStart.getDate() + i); const k = this.keyOf(d);\n      const inMonth = d.getMonth() === cm - 1; const isToday = k === tk; const isSel = k === sel;\n      const count = (this.state.events || []).filter(e => e.date === k).length;\n      cells.push({ key: k, day: d.getDate(), count, showDot: count > 0, onClick: () => this.selectCalDay(k),\n        cellBg: isSel ? 'var(--accent)' : (isToday ? 'rgba(232,162,76,0.08)' : 'transparent'),\n        cellColor: isSel ? 'var(--accent-ink)' : (inMonth ? 'var(--fg-1)' : 'var(--fg-4)'),\n        cellBorder: isSel ? 'var(--accent)' : (isToday ? 'var(--accent)' : 'var(--line-soft)'),\n        cellWeight: (isToday || isSel) ? '600' : '400',\n        dotColor: isSel ? 'var(--accent-ink)' : 'var(--accent)' });\n    }\n    const M = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n    const p = this.state.calParsed;\n    let parsed = null;\n    if (p) parsed = { title: p.title, date: p.date, time: p.time || '', notes: p.notes || '', dateLabel: this.relLabel(p.date), timeLabel: p.time ? this.fmtTime(p.time) : 'All day', durLabel: p.durationMin ? this.calDur(p.durationMin) : '', hasDur: !!p.durationMin, confColor: p.confidence === 'high' ? '#7fae8a' : p.confidence === 'medium' ? 'var(--accent)' : 'var(--fg-3)', confLabel: p.ai ? 'AI parsed' : (p.confidence + ' confidence') };\n    const agenda = onDay(sel); const tmr = onDay(this.relKey(1));\n    return {\n      showCalendar: this.state.view === 'calendar',\n      onOpenCalendar: () => this.openCalendar(),\n      calComposer: this.state.calComposer || '',\n      onCalInput: (e) => this.setCalComposer(e.target.value),\n      onCalKey: (e) => { if (e.key === 'Enter') { e.preventDefault(); this.composeParse(); } },\n      onCalSubmit: () => this.composeParse(),\n      calBusy: !!this.state.calBusy,\n      calExamples: ['Lift at 6pm tomorrow', 'Doctor appointment Thursday at 2', 'Study session tomorrow at 7pm for biology exam'],\n      onCalExample0: () => this.setState({ calComposer: 'Lift at 6pm tomorrow' }),\n      onCalExample1: () => this.setState({ calComposer: 'Doctor appointment Thursday at 2' }),\n      onCalExample2: () => this.setState({ calComposer: 'Study session tomorrow at 7pm for biology exam' }),\n      calHasParsed: !!parsed, cp: parsed || {},\n      onCalTitle: (e) => this.setParsedField({ title: e.target.value }),\n      onCalDate: (e) => this.setParsedField({ date: e.target.value }),\n      onCalTime: (e) => this.setParsedField({ time: e.target.value || null }),\n      onCalNotes: (e) => this.setParsedField({ notes: e.target.value }),\n      onCalConfirm: () => this.confirmEvent(),\n      onCalCancel: () => this.cancelParsed(),\n      calMonthLabel: M[cm - 1] + ' ' + cy,\n      calCells: cells,\n      onCalPrev: () => this.calNavMonth(-1), onCalNext: () => this.calNavMonth(1), onCalBackToday: () => this.calBackToToday(),\n      calAgendaLabel: this.relLabel(sel), calAgendaSub: this.fmtDateShort(sel),\n      calAgenda: agenda, calAgendaEmpty: agenda.length === 0, calViewingToday: sel === tk, calNotToday: sel !== tk,\n      calTomorrow: tmr, calTomorrowEmpty: tmr.length === 0,\n      calHasFlash: !!this.state.calFlash, calFlash: this.state.calFlash || '',\n      // ---- calendar assistant chatbot ----\n      calChat: (this.state.calChat || []).map(m => m.role === 'user'\n        ? { text: m.text, rowJustify: 'flex-end', bubbleBg: 'var(--accent)', bubbl    const mins = this.state.relockMin;\n    if (this.state.vaultEnabled && mins > 0 && this.state.cabinetUnlocked) {\n      this._relockT = setTimeout(() => this.lockCabinet(), mins * 60000);\n    }\n  }\n\n  // ---- settings: enable / change / disable the vault password ----\n  openPwSetup() { this.setState({ pwSetupOpen: true, pwNew: '', pwNew2: '', pwSetupErr: '' }); }\n  closePwSetup() { this.setState({ pwSetupOpen: false, pwNew: '', pwNew2: '', pwSetupErr: '' }); }\n\n  async savePw() {\n    const a = this.state.pwNew, b = this.state.pwNew2;\n    if (!a || a.length < 4) { this.setState({ pwSetupErr: 'use at least 4 characters' }); return; }\n    if (a !== b) { this.setState({ pwSetupErr: 'passwords don\\u2019t match' }); return; }\n    const hash = await this.hashSecret(a);\n    this.setState({ vaultHash: hash, vaultEnabled: true, cabinetUnlocked: true, pwSetupOpen: false, pwNew: '', pwNew2: '', pwSetupErr: '' }, () => { this.persist(); this.resetRelock(); });\n  }\n\n  toggleVault() {\n    if (this.state.vaultEnabled) {\n      // disable — login remains the gate; clear the stored hash\n      this.setState({ vaultEnabled: false, vaultHash: null, cabinetUnlocked: true, pwGateErr: '' }, () => this.persist());\n    } else {\n      this.openPwSetup();\n    }\n  }\n\n  addCat() {\n    const name = (this.state.newCatDraft || '').trim();\n    if (!name || this.state.cabinetCats.some(c => c.toLowerCase() === name.toLowerCase())) { this.setState({ newCatDraft: '' }); return; }\n    this.setState(s => ({ cabinetCats: [...s.cabinetCats, name], newCatDraft: '' }), () => this.persist());\n  }\n  removeCat(name) {\n    if (name === 'General') return;\n    this.setState(s => ({\n      cabinetCats: s.cabinetCats.filter(c => c !== name),\n      fileFilter: s.fileFilter === name ? 'All' : s.fileFilter,\n    }), () => this.persist());\n    // reassign any files in the removed category to General\n    this.state.files.filter(f => f.category === name).forEach(f => this.updateFile(f. _targets', { col: 'category', asc: true }),\n          q('savings_goals', { col: 'sort', asc: true }),\n          q('investment_holdings', { col: 'value', asc: false }),\n          this._sb.from('market_notes').select('*').or(`user_id.eq.${uid},user_id.is.null`).order('published_at', { ascending: false }).limit(8),\n          this._sb.from('financial_balances').select('*').eq('user_id', uid).order('as_of', { ascending: false }),\n          this._sb.from('financial_connections').select('id,status,last_synced_at,institution_id,provider').eq('user_id', uid),\n        ]);\n        // attach the latest balance snapshot to each account (Plaid stores balances in a\n        // separate table). Credit balances are owed → shown negative for net-worth math.\n        const latestBal = {};\n        (bal.data || []).forEach(b => { if (!(b.account_id in latestBal)) latestBal[b.account_id] = b; });\n        const accounts = (acc.data || []).map(a => {\n          if (a._bal != null) return a;\n          const b = latestBal[a.id];\n          if (!b) return a;\n          const cur = Number(b.current != null ? b.current : (b.available || 0));\n          return { ...a, _bal: a.type === 'credit' ? -Math.abs(cur) : cur, _limit: b.limit };\n        });\n        const fin = {\n          accounts, transactions: txn.data || [], budgets: bud.data || [],\n          goals: goal.data || [], holdings: hold.data || [], marketNotes: notes.data || [],\n        };\n        const empty = !fin.accounts.length && !fin.transactions.length && !fin.goals.length && !fin.holdings.length;\n        if (empty) { await this.seedFinanceDemo(); return; }\n        this.setState({ finance: fin, financeLoaded: true, financeConnections: conn.data || [], financeSyncedAt: Date.now() });\n        this.cacheFinance(fin);\n        return;\n      } catch (e) { /* fall through to local */ }\n    }\n\n    // 3) offline / not signed in — seed demo locally if nothing cached\n    const f = this.state.finance;\n    if (!this.state.financeLoaded && !f.accounts.length && !f.transactions.length) {\n      this.seedFinanceLocal();\n    }\n    this.setState({ financeLoaded: true });\n  }\n\n  // Demo dataset — flows through the SAME shape Plaid would fill, so the UI is identical\n  // whether data is mock, manually entered, or live-synced.\n  _demoFinance() {\n    const today = new Date();\n    const y = today.getFullYear(), m = today.getMonth();\n    const d = (mm, dd) => `${y}-${String(mm + 1).padStart(2, '0')}-${String(dd).padStart(2, '0')}`;\n    const mk = (id, posted, amount, merchant, category, opt) => Object.assign({ id, posted_at: posted, amount, merchant, description: merchant, category, category_source: 'auto', pending: false, is_recurring: false, demo: true }, opt || {});\n    const accounts = [\n      { id: 'da1', name: 'Everyday Checking', mask: '4821', type: 'depository', subtype: 'checking', currency: 'USD', is_active: true, sort: 0, _bal: 4280.55, demo: true },\n      { id: 'da2', name: 'High-Yield Savings', mask: '7732', type: 'depository', subtype: 'savings', currency: 'USD', is_active: true, sort: 1, _bal: 18650.00, demo: true },\n      { id: 'da3', name: 'Sapphire Card', mask: '0094', type: 'credit', subtype: 'credit card', currency: 'USD', is_active: true, sort: 2, _bal: -1245.30, _limit: 12000, demo: true },\n      { id: 'da4', name: 'Brokerage', mask: '5510', type: 'investment', subtype: 'brokerage', currency: 'USD', is_active: true, sort: 3, _bal: 42180.00, demo: true },\n    ];\n    const txns = [\n      mk('dt1', d(m, Math.min(today.getDate(), 2)), 1820.00, 'Rent — Maple St', 'Housing', { is_recurring: true, recurring_group: 'rent' }),\n      mk('dt2', d(m, 3), 64.20, 'Whole Foods', 'Groceries'),\n      mk('dt3', d(m, 4), 15.49, 'Netflix', 'Subscriptions', { is_recurring: true, recurring_group: 'netflix' }),\n      mk('dt4', d(m, 4), 9.99, 'Spotify', 'Subscriptions', { is_recurring: true, recurring_group: 'spotify' }),\n      mk('dt5', d(m, 5), 52.80, 'Shell', 'Transport 200, demo: true },\n      { id: 'dh2', symbol: 'VXUS', name: 'Vanguard Total Intl', asset_class: 'etf', sector: 'Broad market', value: 6200, cost_basis: 5800, demo: true },\n      { id: 'dh3', symbol: 'BND', name: 'Vanguard Total Bond', asset_class: 'bond', sector: 'Fixed income', value: 4100, cost_basis: 4300, demo: true },\n      { id: 'dh4', symbol: 'AAPL', name: 'Apple', asset_class: 'equity', sector: 'Technology', value: 7600, cost_basis: 4900, demo: true },\n      { id: 'dh5', symbol: 'NVDA', name: 'NVIDIA', asset_class: 'equity', sector: 'Technology', value: 5200, cost_basis: 1800, demo: true },\n      { id: 'dh6', symbol: 'CASH', name: 'Settlement cash', asset_class: 'cash', sector: 'Cash', value: 2280, cost_basis: 2280, demo: true },\n    ];\n    const marketNotes = [\n      { id: 'dn1', headline: 'Broad-market index funds near highs', tag: 'broad-market', summary: 'Diversified total-market funds continue to track the overall economy; the case for low-cost breadth over single-stock bets is unchanged.', published_at: new Date().toISOString(), demo: true },\n      { id: 'dn2', headline: 'Tech concentration keeps rising in cap-weighted indexes', tag: 'tech', summary: 'A handful of large tech names now drive an outsized share of index returns — broad funds carry more tech exposure than they used to.', published_at: new Date(Date.now() - 86400000).toISOString(), demo: true },\n      { id: 'dn3', headline: 'Rates steady; cash yields still meaningful', tag: 'rates', summary: 'Short-term cash and high-yield savings remain a reasonable place for an emergency fund while rates hold.', published_at: new Date(Date.now() - 2 * 86400000).toISOString(), demo: true },\n    ];\n    return { accounts, transactions: txns, budgets, goals, holdings, marketNotes };\n  }\n\n  seedFinanceLocal() {\n    const fin = this._demoFinance();\n    this.setState({ finance: fin, financeLoaded: true, financeSeeded: true });\n    this.cacheFinance(fin);\n  }\n\n  // Seed demo rows into Supabase on first run so the user has something real to edit.\n  async seedFinanceDemo() {\n    if (!this._sb || !this.state.user) { this.seedFinanceLocal(); return; }\n    // Use local demo for instant UX; we DON'T auto-write demo to the cloud to avoid clutter.\n    // The user can add real rows which persist; demo is clearly flagged and clears like the board.\n    this.seedFinanceLocal();\n  }\n\n  // ----- finance helpers -----\n  _monthBounds(offset) {\n    const n = new Date(); const dt = new Date(n.getFullYear(), n.getMonth() + (offset || 0), 1);\n    const start = new Date(dt.getFullYear(), dt.getMonth(), 1);\n    const end = new Date(dt.getFullYear(), dt.getMonth() + 1, 1);\n    const key = ds => `${ds.getFullYear()}-${String(ds.getMonth() + 1).padStart(2, '0')}-${String(ds.getDate()).padStart(2, '0')}`;\n    return { start: key(start), end: key(end), label: dt.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }) };\n  }\n  // ===== Merchant enrichment engine: normalize raw bank text → clean merchant,\n  // category + subcategory, and a confidence score. Learns from user corrections. =====\n  _merchantDB() {\n    // [matcher regex, Clean Merchant, Category, Subcategory]\n    return [\n      [/cumberland\\s*farms|cumby/, 'Cumberland Farms', 'Food & Drinks', 'Convenience'],\n      [/\\bwawa\\b|sheetz|quiktrip|circle\\s*k|7[\\s-]*eleven|speedway/, 'Convenience Store', 'Food & Drinks', 'Convenience'],\n      [/shell|exxon|mobil|chevron|bp\\b|sunoco|gulf|citgo|gas\\b|fuel/, 'Gas Station', 'Transport', 'Gas'],\n      [/whole\\s*foods/, 'Whole Foods', 'Groceries', 'Grocery'],\n      [/trader\\s*joe/, \"Trader Joe's\", 'Groceries', 'Grocery'],\n      [/costco/, 'Costco', 'Groceries', 'Warehouse'],\n      [/safeway|kroger|aldi|stop\\s*&?\\s*shop|hannaford|publix|wegmans|market\\s*basket|grocery/, 'Grocery Store', 'Groceries', 'Grocery'],\n      [/starbucks|dunkin|peet|blue\\s*bottle|coffee|cafe|café/, 'Coffee Shop', 'Dining', 'Coffee'],\n      [/chipotle|panera|sweetgreen|cava|qdoba|five\\s*guys|shake\\s*shack|mcdonald|burger|wendy|taco\\s*bell|subway|popeyes|chick[\\s-]*fil/, 'Fast Food', 'Dining', 'Fast food'],\n      [/bistro|grill|restaurant|kitchen|tavern|pizzeria|pizza|sushi|ramen|thai|diner|steakhouse|bar\\s*&|brewing|brewery/, 'Restaurant', 'Dining', 'Restaurant'],\n      [/netflix|hulu|disney|hbo|max\\b|peacock|paramount/, 'Streaming', 'Subscriptions', 'Streaming'],\n      [/spotify|apple\\s*music|pandora|tidal|youtube\\s*premium/, 'Music', 'Subscriptions', 'Music'],\n      [/icloud|google\\s*storage|dropbox|notion|chatgpt|openai|adobe|github|1password/, 'Software', 'Subscriptions', 'Software'],\n      [/amazon|amzn/, 'Amazon', 'Shopping', 'Online'],\n      [/target|walmart|best\\s*buy|rei\\b|kohl|macy|nordstrom|tj\\s*maxx|marshalls/, 'Retail', 'Shopping', 'Retail'],\n      [/uber|lyft|taxi|cab\\b/, 'Rideshare', 'Transport', 'Rideshare'],\n      [/delta|united|american\\s*air|jetblue|southwest|alaska\\s*air|spirit|frontier|airline|airport/, 'Airline', 'Travel', 'Flights'],\n      [/airbnb|hotel|marriott|hilton|hyatt|expedia|booking\\.com|vrbo/, 'Lodging', 'Travel', 'Lodging'],\n      [/eversource|national\\s*grid|electric|pse&g|con\\s*ed/, 'Electric', 'Utilities', 'Electric'],\n      [/comcast|xfinity|verizon|at&t|t-mobile|spectrum|internet|broadband/, 'Internet / Phone', 'Utilities', 'Telecom'],\n      [/water|sewer|gas\\s*company|nat.*gas/, 'Water / Gas', 'Utilities', 'Home'],\n      [/rent|mortgage|landlord|apartment|property\\s*mgmt|zillow\\s*rent/, 'Rent / Mortgage', 'Housing', 'Rent'],\n      [/cvs|walgreens|rite\\s*aid|pharmacy|drug\\s*store/, 'Pharmacy', 'Health', 'Pharmacy'],\n      [/gym|fitness|planet\\s*fit|equinox|crossfit|peloton|class\\s*pass/, 'Fitness', 'Health', 'Fitness'],\n      [/payroll|salary|direct\\s*dep|deposit|ach\\s*credit|refund|interest|venmo\\s*cashout/, 'Income', 'Income', 'Income'],\n    ];\n  }\n  _cleanRaw(raw) {\n    // strip common bank noise: trailing store #, card tails, dates, cities, POS prefixes\n    let s = (raw || '').toString();\n    s = s.replace(/\\b(pos|sq|tst|sp|pp|paypal|dd|ach|debit|credit|purchase|payment)\\b[\\s*:#-]*/gi, ' ');\n    s = s.replace(/[#*]\\s*\\d{2,}/g, ' ').replace(/\\b\\d{2,}\\b/g, ' ');     // store/card numbers\n    s = s.replace(/\\b\\d{1,2}\\/\\d{1,2}(\\/\\d{2,4})?\\b/g, ' ');               // dates\n    s = s.replace(/\\s{2,}/g, ' ').trim();\n    return s;\n  }\n  // Returns { merchant, category, subcategory, confidence: 'high'|'medium'|'low', source }\n  enrich(rawName, prevAmount) {\n    const raw = (rawName || '').trim();\n    const cleaned = this._cleanRaw(raw);\n    const key = cleaned.toLowerCase();\n    // 1) user override wins (learned correction), exact-ish merchant key\n    const overrides = this.state.merchantOverrides || {};\n    for (const ok of Object.keys(overrides)) {\n      if (key.includes(ok) || ok.includes(key)) {\n        const o = overrides[ok];\n        return { merchant: o.merchant || this._titleCase(cleaned), category: o.category, subcategory: o.subcategory || '', confidence: 'high', source: 'learned' };\n      }\n    }\n    // 2) merchant DB\n    for (const [re, name, cat, sub] of this._merchantDB()) {\n      if (re.test(key)) {\n        // Gas/convenience hybrids (Cumberland Farms, Wawa, Sheetz, Circle K…): the amount\n        // tells us fuel vs snack. A ~$45 charge is almost certainly a fill-up; a few dollars\n        // is a snack/coffee run. Threshold ~$18.\n        const isHybrid = /cumberland|cumby|wawa|sheetz|quiktrip|circle\\s*k|7[\\s-]*eleven|speedway/.test(key);\n        const amt = Math.abs(Number(prevAmount) || 0);\n        if (isHybrid && amt >= 18) {\n          return { merchant: name, category: 'Transport', subcategory: 'Gas', confidence: amt >= 25 ? 'high' : 'medium', source: 'rule+amount' };\n        }\n        if (isHybrid && amt > 0 && amt < 18) {\n          return { merchant: name, category: 'Food & Drinks', subcategory: 'Snacks', confidence: 'medium', source: 'rule+amount' };\n        }\n        const generic = /store|restaurant|retail|grocery|coffee|fast food|airline|lodging|electric/i.test(name);\n        return { merchant: name, category: cat, subcategory: sub, confidence: generic ? 'medium' : 'high', source: 'rule' };\n      }\n    }\n    // 3) unknown\n    return { merchant: this._titleCase(cleaned) || 'Unknown', category: 'Other', subcategory: '', confidence: 'low', source: 'none' };\n  }\n  _titleCase(s) {\n    return (s || '').toLowerCase().replace(/\\b\\w/g, c => c.toUpperCase()).replace(/'S\\b/g, \"'s\");\n  }\n  // backward-compatible: old callers expect a category string\n  _autoCategory(merchant) {\n    return this.enrich(merchant).category;\n  }\n\n  // Record a user correction so future matching improves.\n  learnCorrection(rawName, category, subcategory, merchant) {\n    const key = this._cleanRaw(rawName || '').toLowerCase();\n    if (!key) return;\n    this.setState(s => {\n      const merchantOverrides = { ...(s.merchantOverrides || {}), [key]: { category, subcategory: subcategory || '', merchant: merchant || this._titleCase(key) } };\n      try { localStorage.setItem('inkboard:merchantOverrides', JSON.stringify(merchantOverrides)); } catch (e) {}\n      return { merchantOverrides };\n    });\n    if (this._sb && this.state.user) {\n      try { this._sb.from('merchant_overrides').upsert({ user_id: this.state.user.id, match_key: key, merchant: merchant || this._titleCase(key), category, subcategory: subcategory || '', updated_at: new Date().toISOString() }, { onConflict: 'user_id,match_key' }).then(() => {}, () => {}); } catch (e) {}\n    }\n  }\n\n  // ----- finance CRUD (writes to Supabase when connected; always updates local cache) -----\n  async finUpsert(table, row, localKey) {\n    this.markTyping();\n    // optimistic local update\n    this.setState(s => {\n      const list = s.finance[localKey].slice();\n      const i = list.findIndex(x => x.id === row.id);\n      if (i >= 0) list[i] = { ...list[i], ...row, demo: false }; else list.unshift({ ...row, demo: false });\n      const fin = { ...s.finance, [localKey]: list };\n      this.cacheFinance(fin);\n      return { finance: fin };\n    });\n    if (this._sb && this.state.user && !String(row.id || '').startsWith('d')) {\n      const payload = { ...row, user_id: this.state.user.id };\n      delete payload.demo; delete payload._bal; delete payload._limit;\n      try { await this._sb.from(table).upsert(payload); } catch (e) {}\n    }\n  }\n  async finInsert(table, row, localKey) {\n    const id = (this._sb && this.state.user) ? undefined : 'u' + Date.now();\n    const local = { ...row, id: id || ('u' + Date.now()) };\n    this.setState(s => { const fin = { ...s.finance, [localKey]: [local, ...s.finance[localKey]] }; this.cacheFinance(fin); return { finance: fin }; });\n    if (this._sb && this.state.user) {\n      const payload = { ...row, user_id: this.state.user.id };\n      delete payload.demo;\n      try {\n        const { data } = await this._sb.from(table).insert(payload).select().single();\n        if (data) this.setState(s => { const list = s.finance[localKey].map(x => x.id === local.id ? data : x); const fin = { ...s.finance, [localKey]: list }; this.cacheFinance(fin); return { finance: fin }; });\n      } catch (e) {}\n    }\n  }\n  async finDelete(table, id, localKey) {\n    this.setState(s => { const fin = { ...s.finance, [localKey]: s.finance[localKey].filter(x => x.id !== id) }; this.cacheFinance(fin); return { finance: fin, finEditing: null }; });\n    if (this._sb && this.state.user && !String(id).startsWith('d')) { try { await this._sb.from(table).delete().eq('id', id).eq('user_id', this.state.user.id); } catch (e) {} }\n  }\n\n  setBudget(category, amount) {\n    const existing = this.state.finance.budgets.find(b => b.category === category);\n    const row = { id: existing ? existing.id : ('b' + Date.now()), category, monthly_amount: Number(amount) || 0 };\n    this.finUpsert('budget_targets', row, 'budgets');\n  }\n\n  _finMap(kind) {\n    return ({\n      account: { table: 'financial_accounts', key: 'accounts' },\n      txn: { table: 'financial_transactions', key: 'transactions' },\n      budget: { table: 'budget_targets', key: 'budgets' },\n      goal: { table: 'savings_goals', key: 'goals' },\n      holding: { table: 'investment_holdings', key: 'holdings' },\n    })[kind];\n  }\n  saveFinEditor() {\n    const ed = this.state.finEditing; if (!ed) return;\n    const map = this._finMap(ed.kind); if (!map) return;\n    let d = { ...this.state.finDraft };\n    // normalize / auto-categorize\n    if (ed.kind === 'txn') {\n      d.amount = Number(d.amount) || 0;\n      // enrich whenever category is blank/Other, or the user left the merchant as raw text\n      if (!d.category || d.category === 'Other') {\n        const e = this.enrich(d.merchant, d.amount);\n        d.category = e.category;\n        if (!d.subcategory) d.subcategory = e.subcategory;\n        if (!d.merchant_clean) d.merchant_clean = e.merchant;\n        d.category_confidence = e.confidence;\n      }\n      if (!d.posted_at) d.posted_at = new Date().toISOString().slice(0, 10);\n      // If the user manually picked a category that differs from our guess, learn it.\n      if (d.category && d.category !== 'Other' && d._enrichGuess && d.category !== d._enrichGuess && d.merchant) {\n        this.learnCorrection(d.merchant, d.category, d.subcategory, d.merchant_clean);\n        d.category_confidence = 'high';\n      }\n      delete d._enrichGuess;\n    }\n    if (ed.kind === 'budget') d.monthly_amount = Number(d.monthly_amount) || 0;\n    if (ed.kind === 'goal') { d.target_amount = Number(d.target_amount) || 0; d.current_amount = Number(d.current_amount) || 0; if (!d.target_date) d.target_date = null; }\n    if (ed.kind === 'holding') { d.value = Number(d.value) || 0; d.cost_basis = Number(d.cost_basis) || 0; }\n    if (ed.kind === 'account') d._bal = Number(d._bal) || 0;\n    if (ed.id) { d.id = ed.id; this.finUpsert(map.table, d, map.key); }\n    else { this.finInsert(map.table, d, map.key); }\n    this.setState({ finEditing: null });\n  }\n  deleteFinEditor() {\n    const ed = this.state.finEditing; if (!ed || !ed.id) { this.setState({ finEditing: null }); return; }\n    const map = this._finMap(ed.kind); if (!map) return;\n    this.finDelete(map.table, ed.id, map.key);\n  }\n\n  // ============ FINANCE — provider abstraction (Plaid via Supabase Edge Functions) ============\n  // The browser never sees Plaid secrets or access tokens. It only: (1) asks our edge\n  // function for a short-lived Link token, (2) runs Plaid Link, (3) hands the resulting\n  // public_token back to our edge function to exchange + store server-side.\n  async _fnCall(path, body) {\n    const { data } = await this._sb.auth.getSession();\n    const token = data && data.session && data.session.access_token;\n    if (!token) throw new Error('not signed in');\n    const res = await fetch(`${this.SB_URL}/functions/v1/${path}`, {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, 'apikey': this.SB_KEY },\n      body: JSON.stringify(body || {}),\n    });\n    const json = await res.json().catch(() => ({}));\n    if (!res.ok) throw new Error(json.error || ('request failed: ' + path));\n    return json;\n  }\n\n  async connectBank() {\n    if (!this._sb || !this.state.user) { this.setState({ finConnectErr: 'sign in first to link a bank.' }); return; }\n    if (!window.Plaid) { this.setState({ finConnectErr: 'Plaid Link is still loading — try again in a moment.' }); return; }\n    this.setState({ finConnecting: true, finConnectErr: '' });\n    try {\n      const { link_token } = await this._fnCall('plaid-link-token', {});\n      const handler = window.Plaid.create({\n        token: link_token,\n        onSuccess: async (public_token, metadata) => {\n          try {\n            await this._fnCall('plaid-exchange', { public_token, institution: metadata && metadata.institution });\n            this.setState({ finSyncing: true });\n            await this._fnCall('plaid-sync', {});\n            await this.fetchFinance();\n          } catch (e) {\n            this.setState({ finConnectErr: (e && e.message) || 'could not finish linking' });\n          } finally {\n            this.setState({ finConnecting: false, finSyncing: false });\n          }\n        },\n        onExit: (err) => { this.setState({ finConnecting: false, finConnectErr: err ? (err.display_message || 'link cancelled') : '' }); },\n      });\n      handler.open();\n    } catch (e) {\n      // Most common cause: edge functions not deployed / Plaid keys not set yet.\n      this.setState({ finConnecting: false, finConnectErr: (e && e.message) || 'bank linking is not set up yet — see Settings → Connections.' });\n    }\n  }\n\n  async syncBanks() {\n    if (!this._sb || !this.state.user) return;\n    this.setState({ finSyncing: true, finConnectErr: '' });\n    try { await this._fnCall('plaid-sync', {}); await this.fetchFinance(); }\n    catch (e) { this.setState({ finConnectErr: (e && e.message) || 'sync failed' }); }\n    finally { this.setState({ finSyncing: false }); }\n  }\n\n  // ============ RUNNING — access ============\n  openRunning() {\n    this.setState({ view: 'running', showAdd: false, showLoc: false, runTab: 'overview' }, () => this.fetchRunning());\n  }\n\n  openHealth() {\n    this.setState({ view: 'health', showAdd: false, showLoc: false, healthTab: 'today' }, () => this.fetchSleep());\n  }\n\n  // ============ NUTRITION (Cronometer-ready, local-first) ============\n  nutKey() { return this.state.nutDate || this.todayKey(); }\n  setNutView(v) { this.setState({ nutView: v }); }\n  stepNutDate(delta) {\n    const d = new Date(this.nutKey() + 'T00:00:00'); d.setDate(d.getDate() + delta);\n    const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;\n    if (k > this.todayKey()) return; // no future days\n    this.setState({ nutDate: k === this.todayKey() ? null : k });\n  }\n  setNutDraft(patch) { this.setState(s => ({ nutDraft: { ...s.nutDraft, ...patch } })); }\n  setNutTarget(key, val) {\n    const n = Math.max(0, Math.round(Number(val) || 0));\n    this.setState(s => ({ nutrition: { ...s.nutrition, targets: { ...s.nutrition.targets, [key]: n } } }), () => this.persist());\n  }\n  addFood() {\n    const d = this.state.nutDraft; const name = (d.name || '').trim(); if (!name) return;\n    const num = v => { const n = Number(String(v).replace(/[^0-9.]/g, '')); return isNaN(n) ? 0 : Math.round(n * 10) / 10; };\n    const entry = { id: this.uid(), meal: d.meal || 'Snack', name, kcal: num(d.kcal), protein: num(d.protein), carbs: num(d.carbs), fat: num(d.fat), fiber: num(d.fiber), cholesterol: num(d.cholesterol), water: num(d.water) };\n    const key = this.nutKey();\n    this.setState(s => {\n      const log = { ...s.nutrition.log }; log[key] = [...(log[key] || []), entry];\n      return { nutrition: { ...s.nutrition, log }, nutDraft: { meal: d.meal, name: '', kcal: '', protein: '', carbs: '', fat: '', fiber: '', cholesterol: '', water: '' } };\n    }, () => this.persist());\n  }\n  deleteFood(id) {\n    const key = this.nutKey();\n    this.setState(s => { const log = { ...s.nutrition.log }; log[key] = (log[key] || []).filter(e => e.id !== id); return { nutrition: { ...s.nutrition, log } }; }, () => this.persist());\n  }\n  _nutDay(key) {\n    const entries = this.state.nutrition.log[key] || [];\n    const t = { kcal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0, cholesterol: 0, water: 0 };\n    entries.forEach(e => { t.kcal += e.kcal || 0; t.protein += e.protein || 0; t.carbs += e.carbs || 0; t.fat += e.fat || 0; t.fiber += e.fiber || 0; t.cholesterol += e.cholesterol || 0; t.water += e.water || 0; });\n    // No manual entries? Fall back to synced Apple Health / Cronometer daily totals.\n    if (!entries.length) {\n      const syn = this.state.nutrition.micros && this.state.nutrition.micros[key] && this.state.nutrition.micros[key].totals;\n      if (syn) ['kcal', 'protein', 'carbs', 'fat', 'fiber', 'cholesterol', 'water'].forEach(k => { t[k] = syn[k] || 0; });\n    }\n    return { entries, totals: t };\n  }\n  deriveNutrition() {\n    const key = this.nutKey();\n    const targets = this.state.nutrition.targets;\n    const { entries, totals } = this._nutDay(key);\n    const days = [];\n    const base = new Date(key + 'T00:00:00');\n    for (let i = 6; i >= 0; i--) { const d = new Date(base); d.setDate(d.getDate() - i); const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; days.push({ k, ...this._nutDay(k).totals, label: ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'][d.getDay()] }); }\n    const logged = days.filter(d => d.kcal > 0 || d.protein > 0);\n    const wk = { kcal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0, cholesterol: 0, water: 0 };\n    logged.forEach(d => { wk.kcal += d.kcal; wk.protein += d.protein; wk.carbs += d.carbs; wk.fat += d.fat; wk.fiber += d.fiber; wk.cholesterol += d.cholesterol || 0; wk.water += d.water || 0; });\n    const n = logged.length || 1;\n    const avg = { kcal: Math.round(wk.kcal / n), protein: Math.round(wk.protein / n), carbs: Math.round(wk.carbs / n), fat: Math.round(wk.fat / n), fiber: Math.round(wk.fiber / n), cholesterol: Math.round(wk.cholesterol / n), water: Math.round(wk.water / n) };\n    const micros = (this.state.nutrition.micros && this.state.nutrition.micros[key]) || null;\n    return { key, entries, totals, targets, days, avg, daysLogged: logged.length, micros };\n  }\n  // grounded feedback, tied to training + recovery\n  nutInsights(N) {\n    const out = []; const t = N.totals, tg = N.targets;\n    const pct = (a, b) => b ? a / b : 0;\n    const isToday = N.key === this.todayKey();\n    const hour = (this.state.now || new Date()).getHours();\n    let ranToday = false; try { const rs = this.runStats(); ranToday = rs && rs.daysSinceLast === 0; } catch (e) {}\n    let recovery = null; try { const H = this.deriveHealth(); if (H && H.sleep) recovery = H.recovery; } catch (e) {}\n    if (N.entries.length === 0) {\n      out.push({ tone: 'note', what: 'Nothing logged' + (isToday ? ' today' : ' this day'), why: 'Add meals to see macro coverage, trends, and tailored feedback.', next: 'Tap “Add food” below to log your first item.' });\n      return out;\n    }\n    if (pct(t.protein, tg.protein) < 0.8) {\n      out.push({ tone: 'warn', what: `Low protein — ${Math.round(t.protein)}g of ${tg.protein}g`, why: ranToday ? 'You trained today, so protein matters more for repair.' : 'Protein supports muscle, satiety, and recovery.', next: `Add ~${Math.max(0, Math.round(tg.protein - t.protein))}g — a shake, yogurt, or chicken closes the gap.` });\n    } else if (pct(t.protein, tg.protein) >= 1) {\n      out.push({ tone: 'good', what: 'Protein target hit', why: 'Solid protein supports recovery and keeps you full.', next: 'Keep this as your daily floor.' });\n    }\n    if (pct(N.avg.fiber, tg.fiber) >= 0.9 && N.daysLogged >= 3) {\n      out.push({ tone: 'good', what: 'Fiber is strong this week', why: `Averaging ${N.avg.fiber}g/day — good for gut health and steady energy.`, next: 'Maintain the variety of plants and whole grains.' });\n    } else if (pct(t.fiber, tg.fiber) < 0.5) {\n      out.push({ tone: 'note', what: `Fiber low — ${Math.round(t.fiber)}g of ${tg.fiber}g`, why: 'Fiber steadies blood sugar and digestion.', next: 'Add fruit, beans, or veg to the next meal.' });\n    }\n    if (ranToday && pct(t.kcal, tg.kcal) < 0.7 && hour >= 15) {\n      out.push({ tone: 'warn', what: 'Under-fueling for training', why: `You ran today but you're at ${Math.round(t.kcal)} of ${tg.kcal} kcal.`, next: 'Eat a real meal — under-fueling slows recovery and tomorrow’s session.' });\n    }\n    if (recovery != null && recovery < 45 && pct(t.carbs, tg.carbs) < 0.6) {\n      out.push({ tone: 'note', what: 'Low carbs while recovery is down', why: 'Carbs replenish glycogen and support recovery when you’re run-down.', next: 'Favor easy carbs (rice, oats, fruit) today.' });\n    }\n    if (isToday && pct(t.kcal, tg.kcal) > 1.2) {\n      out.push({ tone: 'note', what: `Over calorie target — ${Math.round(t.kcal)} of ${tg.kcal} kcal`, why: 'One day won’t derail you; patterns matter more.', next: 'No action needed unless this becomes a daily trend.' });\n    }\n    return out.slice(0, 4);\n  }\n\n  // ---- distance/pace helpers (Strava is metric; we display miles) ----\n  kmToMi(km) { return (km || 0) * 0.621371; }\n  miLabel(km, dp) { return this.kmToMi(km).toFixed(dp == null ? 1 : dp) + ' mi'; }\n  paceLabel(km, sec) {\n    const mi = this.kmToMi(km);\n    if (!mi || !sec) return '—';\n    const s = sec / mi; const m = Math.floor(s / 60); const r = Math.round(s % 60);\n    return `${m}:${String(r).padStart(2, '0')}/mi`;\n  }\n  durLabel(sec) {\n    if (!sec) return '—';\n    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = Math.round(sec % 60);\n    return h ? `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}` : `${m}:${String(s).padStart(2, '0')}`;\n  }\n\n  _runCacheKey() { return 'inkboard:running'; }\n  cacheRunning(r) { try { localStorage.setItem(this._runCacheKey(), JSON.stringify(r)); } catch (e) {} }\n\n  async fetchRunning() {\n    try {\n      const cached = localStorage.getItem(this._runCacheKey());\n      if (cached && !this.state.runningLoaded) {\n        const c = JSON.parse(cached);\n        if (c && Array.isArray(c.runs)) c.runs = c.runs.filter(r => !r.demo && !String(r.id || '').startsWith('dr'));\n        this.setState({ running: c });\n      }\n    } catch (e) {}\n    if (this._sb && this.state.user) {\n      try {\n        const uid = this.state.user.id;\n        const [runs, settings, conn, st] = await Promise.all([\n          this._sb.from('runs').select('*').eq('user_id', uid).order('started_at', { ascending: false }).limit(120),\n          this._sb.from('running_settings').select('*').eq('user_id', uid).maybeSingle(),\n          this._sb.from('strava_connections').select('id,status,last_synced_at,athlete_name').eq('user_id', uid).maybeSingle(),\n          this._sb.from('strava_sync_state').select('*').eq('user_id', uid).maybeSingle(),\n        ]);\n        const rows = runs.data || [];\n        if (!rows.length) { this.seedRunningLocal(); this.setState({ runConn: conn.data || null, runSyncState: st.data || null }); return; }\n        const r = { runs: rows, settings: (settings.data) || this.state.running.settings };\n        this.setState({ running: r, runningLoaded: true, runningSeeded: false, runConn: conn.data || null, runSyncState: st.data || null });\n        this.cacheRunning(r);\n        return;\n      } catch (e) { /* fall through */ }\n    }\n    if (!this.state.runningLoaded && !this.state.running.runs.length) this.seedRunningLocal();\n    this.setState({ runningLoaded: true });\n  }\n\n  // Demo runs — same shape Strava fills (distance_km, moving_sec, started_at, type…).\n  // Demo runs disabled — only real (Strava-synced or manually added) runs are shown.\n  _demoRunning() { return { runs: [], settings: { weekly_goal_km: 48.28, mode: 'maintenance' } }; }\n  seedRunningLocal() {\n    this.setState({ runningLoaded: true, runningSeeded: false });\n  }\n\n  // ---- running stats (weekly/monthly volume, consistency, load) ----\n  _startOfWeek(d) { const x = new Date(d); const dow = (x.getDay() + 6) % 7; x.setHours(0, 0, 0, 0); x.setDate(x.getDate() - dow); return x; } // Monday\n  runStats() {\n    const runs = (this.state.running.runs || []).map(r => ({ ...r, _d: new Date(r.started_at) })).sort((a, b) => b._d - a._d);\n    const now = new Date();\n    const wkStart = this._startOfWeek(now);\n    const lastWkStart = new Date(wkStart); lastWkStart.setDate(lastWkStart.getDate() - 7);\n    const monStart = new Date(now.getFullYear(), now.getMonth(), 1);\n    const sum = (from, to) => runs.filter(r => r._d >= from && (!to || r._d < to)).reduce((s, r) => s + (r.distance_km || 0), 0);\n    const weekKm = sum(wkStart, null);\n    const lastWeekKm = sum(lastWkStart, wkStart);\n    const monthKm = sum(monStart, null);\n    const last7 = sum(new Date(now.getTime() - 7 * 864e5), null);\n    const last28 = sum(new Date(now.getTime() - 28 * 864e5), null);\n    const daysSince = runs.length ? Math.floor((now - runs[0]._d) / 864e5) : null;\n    // consistency: weeks (of last 4) with ≥1 run\n    let weeksActive = 0;\n    for (let i = 0; i < 4; i++) {\n      const a = new Date(wkStart); a.setDate(a.getDate() - 7 * i);\n      const b = new Date(a); b.setDate(b.getDate() + 7);\n      if (runs.some(r => r._d >= a && r._d < b)) weeksActive++;\n    }\n    // streak: consecutive days with a run, ending today/yesterday\n    const dayset = new Set(runs.map(r => this.keyOf(r._d)));\n    let streak = 0; const cur = new Date(now);\n    if (!dayset.has(this.keyOf(cur))) cur.setDate(cur.getDate() - 1);\n    while (dayset.has(this.keyOf(cur))) { streak++; cur.setDate(cur.getDate() - 1); }\n    const acwr = last28 ? (last7 / (last28 / 4)) : 0; // acute:chronic load ratio\n    return { runs, weekKm, lastWeekKm, monthKm, last7, last28, daysSince, weeksActive, streak, acwr,\n      avgWeekKm: last28 / 4, lastRun: runs[0] || null };\n  }\n\n  // ---- AI coach (grounded, on-device; no API key) ----\n  buildCoach() {\n    const s = this.runStats();\n    const goalKm = this.state.running.settings.weekly_goal_km || 48.28;\n    const mi = km => this.kmToMi(km);\n    const r1 = n => Math.round(n * 10) / 10;\n    let headline, body, nextKm, nextType, push;\n\n    if (!s.runs.length) {\n      return { headline: 'Log or sync a run to start', body: 'Once a few runs are in, the coach reads your recent load and spacing to suggest the next one.', nextLabel: '—', nextType: 'easy', nextTypeLabel: 'Easy run', pushLabel: 'neutral', pushColor: 'var(--fg-3)', recovery: 'Connect Strava or add a run to get grounded suggestions.' };\n    }\n\n    const days = s.daysSince == null ? 99 : s.daysSince;\n    const trendUp = s.last7 > s.avgWeekKm * 1.15;\n    const trendDown = s.last7 < s.avgWeekKm * 0.7;\n\n    if (days >= 10) {\n      headline = `${days} days off — ease back in`;\n      nextKm = Math.max(4, Math.min(6.5, s.avgWeekKm * 0.12));\n      nextType = 'easy';\n      body = `You haven't run in ${days} days. Restart conservatively with a short, easy effort to wake the legs up — don't chase your old paces this week. Rebuild to your ${r1(mi(goalKm))} mi/wk over 2–3 weeks.`;\n      push = ['ease up', 'var(--fg-2)'];\n    } else if (s.acwr > 1.4) {\n      headline = 'Load spiking — hold back';\n      nextKm = Math.max(5, s.avgWeekKm * 0.14);\n      nextType = 'easy';\n      body = `Your last 7 days (${r1(mi(s.last7))} mi) are well above your 4-week average (${r1(mi(s.avgWeekKm))} mi). That's a fast ramp. Keep the next one easy and short to let your body absorb the work — injuries cluster after spikes like this.`;\n      push = ['ease up', 'var(--accent)'];\n    } else if (days <= 1) {\n      const lastType = s.lastRun.type;\n      if (lastType === 'workout' || lastType === 'long') {\n        headline = 'Recovery day';\n        nextKm = Math.max(4, s.avgWeekKm * 0.13);\n        nextType = 'easy';\n        body = `Yesterday was a ${lastType === 'long' ? 'long run' : 'harder session'}. Follow it with an easy, conversational-pace run (or rest) so the adaptation sticks. Save intensity for 48h out.`;\n        push = ['recover', 'var(--fg-2)'];\n      } else {\n        headline = 'Good to push a little';\n        nextKm = Math.min(s.avgWeekKm * 0.32, 14);\n        nextType = 'workout';\n        body = `You're fresh and recently easy. If you feel good, a tempo or interval session fits here. Aim ${r1(mi(nextKm))} mi with the middle portion at a comfortably-hard effort.`;\n        push = ['push ok', 'var(--accent)'];\n      }\n    } else if (trendDown) {\n      headline = 'Volume dipped — rebuild gently';\n      nextKm = Math.max(6, s.avgWeekKm * 0.2);\n      nextType = 'easy';\n      body = `Your mileage trend is down vs your norm. No need to overcorrect — get a steady easy run in to re-establish rhythm, then layer one quality session later in the week.`;\n      push = ['steady', 'var(--fg-2)'];\n    } else {\n      // weekly long-run cadence\n      const hadLongThisWeek = s.runs.some(r => r.type === 'long' && r._d >= this._startOfWeek(new Date()));\n      if (!hadLongThisWeek) {\n        headline = 'Time for your long run';\n        nextKm = Math.min(Math.max(s.avgWeekKm * 0.34, 12), 24);\n        nextType = 'long';\n        body = `You're on a steady block and haven't done a long run this week. Go ${r1(mi(nextKm))} mi at an easy, conversational pace — long runs build the aerobic base that makes everything else feel easier.`;\n        push = ['build', 'var(--accent)'];\n      } else {\n        headline = 'Steady aerobic run';\n        nextKm = Math.max(7, s.avgWeekKm * 0.22);\n        nextType = 'easy';\n        body = `Load looks balanced (${r1(mi(s.last7))} mi this week vs ${r1(mi(goalKm))} mi goal). Keep stacking easy aerobic miles; add strides at the end if you feel springy.`;\n        push = ['steady', 'var(--fg-2)'];\n      }\n    }\n    const recovery = days <= 1 && (s.lastRun.type === 'workout' || s.lastRun.type === 'long')\n      ? 'Prioritize sleep + protein today; give yourself a genuine easy day before the next hard effort.'\n      : (s.acwr > 1.4 ? 'Sleep and easy days are doing the real work right now — resist adding more.' : 'Easy days easy, hard days hard. Hydrate and keep cadence relaxed.');\n    return {\n      headline, body,\n      nextLabel: `${r1(mi(nextKm))} mi`,\n      nextType,\n      nextTypeLabel: nextType === 'long' ? 'Long run' : nextType === 'workout' ? 'Workout' : 'Easy run',\n      pushLabel: push[0], pushColor: push[1],\n      recovery,\n    };\n  }\n\n  setWeeklyGoal(mi) {\n    const km = (Number(mi) || 0) / 0.621371;\n    const settings = { ...this.state.running.settings, weekly_goal_km: km };\n    this.setState(s => { const r = { ...s.running, settings }; this.cacheRunning(r); return { running: r }; });\n    if (this._sb && this.state.user) {\n      try { this._sb.from('running_settings').upsert({ user_id: this.state.user.id, weekly_goal_km: km, mode: settings.mode, updated_at: new Date().toISOString() }).then(() => {}, () => {}); } catch (e) {}\n    }\n  }\n  setRunMode(mode) {\n    const settings = { ...this.state.running.settings, mode };\n    this.setState(s => { const r = { ...s.running, settings }; this.cacheRunning(r); return { running: r }; });\n    if (this._sb && this.state.user) {\n      try { this._sb.from('running_settings').upsert({ user_id: this.state.user.id, weekly_goal_km: settings.weekly_goal_km, mode, updated_at: new Date().toISOString() }).then(() => {}, () => {}); } catch (e) {}\n    }\n  }\n\n  // ---- Strava connection (OAuth via Supabase edge functions; secrets server-side) ----\n  async connectStrava() {\n    if (!this._sb || !this.state.user) { this.setState({ runConnectErr: 'sign in first to link Strava.' }); return; }\n    this.setState({ runConnecting: true, runConnectErr: '' });\n    try {\n      const { url } = await this._fnCall('strava-auth-url', { redirect: window.location.origin + window.location.pathname });\n      // Strava OAuth happens in a popup; the edge function's callback stores the token,\n      // then posts back. We poll for connection completion.\n      const popup = window.open(url, 'strava', 'width=520,height=720');\n      const started = Date.now();\n      const poll = setInterval(async () => {\n        if (Date.now() - started > 180000) { clearInterval(poll); this.setState({ runConnecting: false }); return; }\n        if (popup && popup.closed) {\n          clearInterval(poll);\n          this.setState({ runSyncing: true });\n          try { await this._fnCall('strava-sync', {}); await this.fetchRunning(); } catch (e) {}\n          this.setState({ runConnecting: false, runSyncing: false });\n        }\n      }, 1500);\n    } catch (e) {\n      this.setState({ runConnecting: false, runConnectErr: (e && e.message) || 'Strava linking is not set up yet — see SETUP.md.' });\n    }\n  }\n  async syncStrava() {\n    if (!this._sb || !this.state.user) return;\n    this.setState({ runSyncing: true, runConnectErr: '' });\n    try { await this._fnCall('strava-sync', {}); await this.fetchRunning(); }\n    catch (e) { this.setState({ runConnectErr: (e && e.message) || 'sync failed' }); }\n    finally { this.setState({ runSyncing: false }); }\n  }\n\n  // ---- manual run logging (no Strava needed) ----\n  openRunEditor() {\n    this.setState({ runEditing: true, runDraft: { dist: '', hrs: '', mins: '', date: this.todayKey(), type: 'easy', name: '' } });\n  }\n  closeRunEditor() { this.setState({ runEditing: false }); }\n  async saveRun() {\n    const d = this.state.runDraft || {};\n    const miles = Number(d.dist) || 0;\n    if (miles <= 0) { this.setState({ runEditing: false }); return; }\n    const sec = (Number(d.hrs) || 0) * 3600 + (Number(d.mins) || 0) * 60;\n    const km = miles / 0.621371;\n    const type = d.type || 'easy';\n    const startISO = new Date((d.date || this.todayKey()) + 'T07:00:00').toISOString();\n    const names = { easy: 'Easy run', workout: 'Workout', long: 'Long run', race: 'Race' };\n    const row = {\n      provider: 'manual', name: (d.name && d.name.trim()) || names[type] || 'Run',\n      type, started_at: startISO, distance_km: Number(km.toFixed(3)),\n      moving_sec: sec, avg_pace_sec_km: sec && km ? Math.round(sec / km) : null,\n    };\n    // optimistic local insert\n    const local = { ...row, id: 'lr' + Date.now() };\n    this.setState(s => { const r = { ...s.running, runs: [local, ...s.running.runs] }; this.cacheRunning(r); return { running: r, runEditing: false, runningSeeded: false }; });\n    if (this._sb && this.state.user) {\n      try {\n        const { data } = await this._sb.from('runs').insert({ ...row, user_id: this.state.user.id }).select().single();\n        if (data) this.setState(s => { const runs = s.running.runs.map(x => x.id === local.id ? data : x); const r = { ...s.running, runs }; this.cacheRunning(r); return { running: r }; });\n      } catch (e) {}\n    }\n  }\n  async deleteRun(id) {\n    this.setState(s => { const r = { ...s.running, runs: s.running.runs.filter(x => x.id !== id) }; this.cacheRunning(r); return { running: r }; });\n    if (this._sb && this.state.user && !String(id).startsWith('lr') && !String(id).startsWith('dr')) {\n      try { await this._sb.from('runs').delete().eq('id', id).eq('user_id', this.state.user.id); } catch (e) {}\n    }\n  }\n\n  // ============ PRIORITY ENGINE — ranks what matters now across every module ============\n  _relDays(dateKey) {\n    if (!dateKey) return 999;\n    const today = new Date(); today.setHours(0, 0, 0, 0);\n    const d = new Date(dateKey + 'T00:00:00'); d.setHours(0, 0, 0, 0);\n    return Math.round((d - today) / 86400000);\n  }\n  _relLabel(d) {\n    return d < 0 ? `${-d}d overdue` : d === 0 ? 'due today' : d === 1 ? 'due tomorrow' : `due in ${d}d`;\n  }\n  // Returns the top 3–5 items to act on, scored across deadlines, schedule, habits, finance.\n  computeAttention() {\n    const items = [];\n    const actionByKind = { budget: 'Review category', spending: 'Set a budget', cashflow: 'Trim spending', recurring: 'Audit subscriptions' };\n\n    // deadlines on any task/list item\n    this.state.cards.forEach(c => {\n      (c.items || []).forEach(it => {\n        if (!it.due || it.done) return;\n        const d = this._relDays(it.due);\n        if (d > 6) return;\n        let sev = 'info', score = 40;\n        if (d < 0) { sev = 'crit'; score = 100 + Math.min(15, -d); }\n        else if (d === 0) { sev = 'crit'; score = 96; }\n        else if (d <= 2) { sev = 'warn'; score = 82 - d * 4; }\n        else { sev = 'info'; score = 60 - d * 3; }\n        items.push({ source: 'deadline', severity: sev, score, label: it.text || 'Untitled task', detail: `${c.title || 'Tasks'} · ${this._relLabel(d)}`, action: 'Open' });\n      });\n    });\n\n    // today's schedule — timed home items happening soon\n    const home = this.state.cards.find(c => c.type === 'home');\n    if (home) {\n      const now = new Date(); const nowMin = now.getHours() * 60 + now.getMinutes();\n      (home.items || []).forEach(it => {\n        if (it.done || !it.time || !/^\\d{1,2}:\\d{2}/.test(it.time)) return;\n        const [h, m] = it.time.split(':').map(Number); const delta = (h * 60 + m) - nowMin;\n        if (delta < -30 || delta > 180) return;\n        items.push({ source: 'schedule', severity: delta <= 30 ? 'warn' : 'info', score: 64 - Math.abs(delta) / 8, label: it.text || 'Event', detail: delta < 0 ? `started · ${it.time}` : `in ${delta}m · ${it.time}`, action: '' });\n      });\n    }\n\n    // habit streak risk\n    this.state.cards.forEach(c => {\n      if (!/habit/i.test(c.title || '') || !Array.isArray(c.items)) return;\n      const open = c.items.filter(it => !it.done);\n      if (open.length) items.push({ source: 'habit', severity: 'warn', score: 52, label: `${open.length} habit${open.length > 1 ? 's' : ''} not checked`, detail: `${c.title} · protect the streak`, action: 'Check in' });\n    });\n\n    // finance — fold in warning-level insights\n    try {\n      this.buildInsights().filter(i => i.severity === 'warn').forEach(i => {\n        items.push({ source: 'finance', severity: i.kind === 'budget' ? 'warn' : 'warn', score: i.kind === 'budget' ? 79 : 71, label: i.title, detail: (i.body || '').split('\\n')[0].replace(/^What happened:\\s*/i, ''), action: actionByKind[i.kind] || 'Review' });\n      });\n    } catch (e) {}\n\n    // running — long gap since last run\n    try {\n      const runs = (this.state.running.runs || []);\n      if (runs.length) {\n        const last = runs.map(r => new Date(r.started_at)).sort((a, b) => b - a)[0];\n        const days = Math.floor((Date.now() - last) / 864e5);\n        if (days >= 4) items.push({ source: 'running', severity: days >= 7 ? 'warn' : 'info', score: 50 + days, label: `${days} days since your last run`, detail: 'Running · ease back in with an easy effort', action: 'Open' });\n      }\n    } catch (e) {}\n\n    items.sort((a, b) => b.score - a.score);\n    return items.slice(0, 5);\n  }\n\n  // Forward-looking weekly layer for planning, not just daily reaction.\n  computeThisWeek() {\n    const deadlines = [];\n    this.state.cards.forEach(c => (c.items || []).forEach(it => {\n      if (!it.due || it.done) return;\n      const d = this._relDays(it.due);\n      if (d >= 0 && d <= 7) deadlines.push({ text: it.text || 'Untitled', d, rel: d === 0 ? 'today' : d === 1 ? 'tomorrow' : `${d}d` });\n    }));\n    deadlines.sort((a, b) => a.d - b.d);\n    const goals = (this.state.finance.goals || []).filter(g => g.target_amount > 0);\n    let savingsLabel = '—';\n    if (goals.length) {\n      const g = goals.map(x => ({ x, pct: x.current_amount / x.target_amount })).sort((a, b) => a.pct - b.pct)[0].x;\n      savingsLabel = `${g.name} · ${Math.round(g.current_amount / g.target_amount * 100)}%`;\n    }\n    const home = this.state.cards.find(c => c.type === 'home');\n    const events = home ? (home.items || []).filter(it => it.time).length : 0;\n    return { deadlines: deadlines.slice(0, 4), deadlineCount: deadlines.length, savingsLabel, events };\n  }\n\n  // ============ CROSS-MODULE DAILY BRIEF ============\n  // One brain that connects health ↔ running ↔ finance ↔ deadlines ↔ habits and speaks in\n  // what-happened / why / what-next. Returns { lead, items:[{tone,what,why,next,tag}] }.\n  buildDailyBrief() {\n    const out = [];\n    const hh = (this.state.now || new Date()).getHours();\n    const greet = hh < 12 ? 'morning' : hh < 18 ? 'afternoon' : 'evening';\n\n    // --- health/recovery drives the day's intensity recommendation ---\n    let recovery = null, readiness = null;\n    try {\n      const H = this.deriveHealth();\n      if (H && H.sleep) {\n        recovery = H.recovery; readiness = H.readiness;\n        const rTone = recovery >= 66 ? 'good' : recovery >= 45 ? 'warn' : 'crit';\n        out.push({\n          tag: 'RECOVERY', tone: rTone,\n          what: `Recovery ${recovery}/100 — ${readiness}.`,\n          why: recovery >= 66 ? 'Your sleep and HRV are at or above baseline.' : recovery >= 45 ? 'Sleep or HRV came in a bit under your baseline.' : 'Sleep and HRV are meaningfully below baseline.',\n          next: recovery >= 66 ? 'Good day to push if you planned a hard effort.' : recovery >= 45 ? 'Keep training moderate; protect tonight\\u2019s sleep.' : 'Favor rest or an easy day; avoid high strain.',\n        });\n      }\n    } catch (e) {}\n\n    // --- running load ↔ recovery cross-link ---\n    try {\n      const rs = this.runStats();\n      const days = rs.daysSinceLast;\n      const wk = this.kmToMi(rs.last7 || 0);\n      if (days != null && days >= 4) {\n        out.push({ tag: 'RUNNING', tone: 'warn', what: `${days} days since your last run.`, why: 'Consistency is slipping versus your usual cadence.', next: recovery != null && recovery < 45 ? 'Recovery is low too — an easy walk/jog is plenty today.' : 'An easy 20–30 min run gets you back on rhythm.' });\n      } else if (wk >= 1) {\n        const hi = recovery != null && recovery < 45;\n        out.push({ tag: 'RUNNING', tone: hi ? 'warn' : 'good', what: `${wk.toFixed(1)} mi logged in the last 7 days.`, why: hi ? 'Load is up while recovery is down — fatigue can accumulate.' : 'Training load looks steady.', next: hi ? 'Hold volume flat or take a down day.' : 'Stay the course; add distance only if recovery holds.' });\n      }\n    } catch (e) {}\n\n    // --- finance: spikes / overspend / cashflow ---\n    try {\n      const fi = this.buildInsights().filter(i => i.severity === 'warn');\n      if (fi.length) {\n        const top = fi[0];\n        out.push({ tag: 'FINANCE', tone: 'warn', what: top.title + '.', why: (top.body || '').split('\\n')[0].replace(/^What happened:\\s*/i, ''), next: top.kind === 'budget' ? 'Ease up in that category for the rest of the month.' : top.kind === 'recurring' ? 'Audit subscriptions for anything unused.' : 'Trim discretionary spend to rebalance.' });\n      }\n    } catch (e) {}\n\n    // --- deadlines: overdue / today ---\n    try {\n      const urgent = [];\n      this.state.cards.forEach(c => (c.items || []).forEach(it => {\n        if (!it.due || it.done) return; const d = this._relDays(it.due);\n        if (d <= 1) urgent.push({ d, text: it.text || 'Untitled' });\n      }));\n      urgent.sort((a, b) => a.d - b.d);\n      if (urgent.length) {\n        const od = urgent.filter(u => u.d < 0).length;\n        out.push({ tag: 'DEADLINES', tone: od ? 'crit' : 'warn', what: od ? `${od} item${od > 1 ? 's' : ''} overdue, ${urgent.length} due now.` : `${urgent.length} due today/tomorrow.`, why: 'These are the closest commitments on your board.', next: `Start with \"${urgent[0].text}\".` });\n      }\n    } catch (e) {}\n\n    // --- habits: streak risk ---\n    try {\n      this.state.cards.forEach(c => {\n        if (!/habit|streak/i.test(c.title || '') || !Array.isArray(c.items)) return;\n        const open = c.items.filter(it => !it.done);\n        if (open.length && out.filter(o => o.tag === 'HABITS').length === 0) {\n          out.push({ tag: 'HABITS', tone: 'warn', what: `${open.length} habit${open.length > 1 ? 's' : ''} still open today.`, why: 'Unchecked habits put your streak at risk.', next: `Knock out \"${open[0].text}\" while it\\u2019s on your mind.` });\n        }\n      });\n    } catch (e) {}\n\n    // lead line: the single highest-priority signal\n    const order = { crit: 0, warn: 1, good: 2 };\n    out.sort((a, b) => order[a.tone] - order[b.tone]);\n    let lead;\n    if (!out.length) lead = `Good ${greet}, Tommy. Nothing flagged — you\\u2019re clear to focus.`;\n    else if (out[0].tone === 'crit') lead = `Good ${greet}, Tommy. A couple of things need you first.`;\n    else if (out[0].tone === 'warn') lead = `Good ${greet}, Tommy. Mostly steady — a few things to watch.`;\n    else lead = `Good ${greet}, Tommy. You\\u2019re in good shape today.`;\n    return { lead, items: out.slice(0, 4) };\n  }\n\n  // ============ FINANCE — insights engine (grounded, on-device, no API key) ============\n  buildInsights() {\n    const fin = this.state.finance;\n    const { start, end } = this._monthBounds(0);\n    const prev = this._monthBounds(-1);\n    const inMonth = (t, b) => t.posted_at >= b.start && t.posted_at < b.end;\n    const spend = t => t.category !== 'Income' && t.amount > 0;\n    const curTxns = fin.transactions.filter(t => inMonth(t, { start, end }) && spend(t));\n    const prevTxns = fin.transactions.filter(t => inMonth(t, prev) && spend(t));\n    const byCat = list => list.reduce((a, t) => { a[t.category] = (a[t.category] || 0) + t.amount; return a; }, {});\n    const cur = byCat(curTxns), pre = byCat(prevTxns);\n    const fmt = n => '$' + Math.round(n).toLocaleString();\n    const out = [];\n\n    // 1) category spike vs last month\n    Object.keys(cur).forEach(cat => {\n      const p = pre[cat] || 0;\n      if (p >= 40 && cur[cat] > p * 1.4) out.push({ kind: 'spending', severity: 'warn', title: `${cat} up sharply`, body: `You've spent ${fmt(cur[cat])} on ${cat} so far this month — about ${Math.round((cur[cat] / p - 1) * 100)}% more than last month's ${fmt(p)}.` });\n    });\n\n    // 2) over/under budget\n    fin.budgets.forEach(b => {\n      const sp = cur[b.category] || 0;\n      if (b.monthly_amount > 0 && sp > b.monthly_amount) out.push({ kind: 'budget', severity: 'warn', title: `Over budget: ${b.category}`, body: `${fmt(sp)} spent against a ${fmt(b.monthly_amount)} budget — ${fmt(sp - b.monthly_amount)} over with the month still going.` });\n      else if (b.monthly_amount > 0 && sp <= b.monthly_amount * 0.6) out.push({ kind: 'budget', severity: 'good', title: `On track: ${b.category}`, body: `${fmt(sp)} of ${fmt(b.monthly_amount)} used — comfortably under budget.` });\n    });\n\n    // 3) recurring / subscriptions\n    const subs = fin.transactions.filter(t => t.is_recurring && t.category === 'Subscriptions');\n    const subKeys = {}; subs.forEach(s => { subKeys[s.recurring_group || s.merchant] = s.amount; });\n    const subTotal = Object.values(subKeys).reduce((a, b) => a + b, 0);\n    if (subTotal > 0) out.push({ kind: 'recurring', severity: 'info', title: 'Recurring subscriptions', body: `${Object.keys(subKeys).length} active subscriptions totaling about ${fmt(subTotal)}/mo. Worth a glance for anything you've stopped using.` });\n\n    // 4) cash flow\n    const income = fin.transactions.filter(t => inMonth(t, { start, end }) && (t.category === 'Income' || t.amount < 0)).reduce((a, t) => a + Math.abs(t.amount), 0);\n    const spent = curTxns.reduce((a, t) => a + t.amount, 0);\n    if (income > 0) {\n      const net = income - spent;\n      out.push({ kind: 'cashflow', severity: net >= 0 ? 'good' : 'warn', title: net >= 0 ? 'Positive cash flow' : 'Spending exceeds income', body: net >= 0 ? `In so far this month: ${fmt(income)} in, ${fmt(spent)} out — net ${fmt(net)} saved.` : `${fmt(spent)} out vs ${fmt(income)} in — running ${fmt(-net)} negative this month.` });\n    }\n\n    // 5) savings pace\n    fin.goals.forEach(g => {\n      if (g.target_amount > 0) {\n        const pct = Math.round((g.current_amount / g.target_amount) * 100);\n        if (pct >= 90) out.push({ kind: 'savings', severity: 'good', title: `${g.name} almost funded`, body: `${pct}% there — ${fmt(g.target_amount - g.current_amount)} to go.` });\n      }\n    });\n\n    // 6) portfolio observations (balanced framing)\n    const holds = fin.holdings || [];\n    const totalInv = holds.reduce((a, h) => a + (h.value || 0), 0);\n    if (totalInv > 0) {\n      const tech = holds.filter(h => (h.sector || '').toLowerCase() === 'technology').reduce((a, h) => a + h.value, 0);\n      const broad = holds.filter(h => (h.sector || '').toLowerCase().includes('broad')).reduce((a, h) => a + h.value, 0);\n      const techPct = Math.round(tech / totalInv * 100);\n      const broadPct = Math.round(broad / totalInv * 100);\n      if (techPct >= 25) {\n        out.push({ kind: 'portfolio', severity: 'info', title: `Tech is ${techPct}% of your portfolio`,\n          body: `What happened: individual tech names (${holds.filter(h => (h.sector || '').toLowerCase() === 'technology').map(h => h.symbol).join(', ')}) make up about ${techPct}% of holdings.\\n\\nWhy it matters: concentration raises both upside and drawdown — your results lean heavily on one sector.\\n\\nBull case: these companies have led market returns and may continue to.\\n\\nRisk case: a sector pullback hits you harder than a broad-market holder. Broad funds (you hold ${broadPct}% in total-market ETFs) spread that risk. This is an observation, not advice.` });\n      } else {\n        out.push({ kind: 'portfolio', severity: 'good', title: 'Broadly diversified', body: `About ${broadPct}% sits in broad total-market funds with no single stock dominating — a diversified, low-concentration mix. Observation, not advice.` });\n      }\n    }\n\n    return out;\n  }\n\n\n  // ============ FILE CABINET — content (RLS-protected Supabase table) ============\n  async fetchFiles() {\n    try {\n      const cached = localStorage.getItem('inkboard:files');\n      if (cached && !this.state.filesLoaded) this.setState({ files: JSON.parse(cached) });\n    } catch (e) {}\n    if (!this._sb || !this.state.user) { this.setState({ filesLoaded: true }); return; }\n    try {\n      const { data, error } = await this._sb.from('filecabinet').select('*').eq('user_id', this.state.user.id).order('pinned', { ascending: false }).order('sort', { ascending: true });\n      if (!error &
